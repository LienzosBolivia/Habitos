  /* Inicializar el cliente de token GIS */
  function initDriveTokenClient(){
    if (typeof google === "undefined" || !google.accounts) return;
    driveTokenClient = google.accounts.oauth2.initTokenClient({
      client_id: DRIVE_CLIENT_ID,
      scope: DRIVE_SCOPE,
      callback: function(tokenResponse){
        var wasSilent = driveIsSilentRenew;
        driveIsSilentRenew = false;
        driveIsReconnecting = false;
        /* Limpiar timeout de fallback si había uno */
        if (driveReconnectTimeout){ clearTimeout(driveReconnectTimeout); driveReconnectTimeout = null; }

        if (tokenResponse && tokenResponse.access_token){
          driveAccessToken = tokenResponse.access_token;
          driveTokenExpiry = Date.now() + (tokenResponse.expires_in || 3600) * 1000 - 60000;

          /* Obtener email del usuario via tokeninfo */
          fetch("https://www.googleapis.com/oauth2/v3/tokeninfo?access_token=" + driveAccessToken)
            .then(function(r){ return r.json(); })
            .then(function(info){
              driveUserEmail = info.email || driveUserEmail || null;
              saveDriveSession(); /* persistir token + email para auto-reconexión */
              updateDriveAuthUI();
            })
            .catch(function(){
              saveDriveSession();
              updateDriveAuthUI();
            });

          updateDriveAuthUI();

          /* Solo mostrar toast si el usuario lo hizo manualmente, no en renovación silenciosa */
          if (!wasSilent){
            showToast("✅ Conectado a Google Drive.");
          }

          /* Arrancar el timer de renovación automática */
          startTokenRefreshTimer();

          /* Si había una operación pendiente, ejecutarla */
          if (typeof driveTokenClient._pendingCallback === "function"){
            var cb = driveTokenClient._pendingCallback;
            driveTokenClient._pendingCallback = null;
            cb();
          }

        } else if (tokenResponse && tokenResponse.error){
          driveIsSilentRenew = false;
          if (wasSilent){
            /* En renovación silenciosa: si Google rechaza (sesión expirada o cookies bloqueadas),
               simplemente marcamos como desconectado sin molestar al usuario */
            console.warn("[Drive] Renovación silenciosa fallida:", tokenResponse.error);
            driveAccessToken = null;
            driveTokenExpiry = 0;
            clearDriveSession();
            updateDriveAuthUI();
          } else {
            setBackupStatus("error", "✖ Auth cancelada o denegada: " + tokenResponse.error);
          }
        }
      },
      error_callback: function(err){
        var wasSilent = driveIsSilentRenew;
        driveIsSilentRenew = false;
        driveIsReconnecting = false;
        if (driveReconnectTimeout){ clearTimeout(driveReconnectTimeout); driveReconnectTimeout = null; }
        if (!wasSilent){
          /* Solo mostrar error si fue intento manual */
          setBackupStatus("error", "✖ Error de autenticación: " + (err.message || err.type || JSON.stringify(err)));
        } else {
          console.warn("[Drive] error_callback silencioso:", err);
          driveAccessToken = null;
          driveTokenExpiry = 0;
          clearDriveSession();
          updateDriveAuthUI();
        }
      }
    });
  }

  /* Intentar conectar / desconectar */
  function handleAuthClick(pendingCallback){
    /* Si estamos reconectando y el usuario pulsa Cancelar */
    if (driveIsReconnecting){
      driveIsReconnecting = false;
      driveIsSilentRenew  = false;
      if (driveReconnectTimeout){ clearTimeout(driveReconnectTimeout); driveReconnectTimeout = null; }
      clearDriveSession();
      updateDriveAuthUI();
      return;
    }
    if (driveAccessToken && Date.now() < driveTokenExpiry){
      /* Desconectar */
      google.accounts.oauth2.revoke(driveAccessToken, function(){});
      driveAccessToken = null;
      driveTokenExpiry = 0;
      driveUserEmail   = null;
      clearDriveSession();   /* eliminar sesión persistida */
      stopTokenRefreshTimer(); /* detener timer de renovación */
      updateDriveAuthUI();
      showToast("Desconectado de Google Drive.");
      return;
    }
    /* Inicializar cliente si todavía no existe (los scripts async pueden tardar) */
    if (!driveTokenClient){
      if (typeof google === "undefined" || !google.accounts){
        setBackupStatus("error", "✖ Los scripts de Google aún no han cargado. Espera unos segundos e intenta de nuevo.");
        return;
      }
      initDriveTokenClient();
    }
    if (pendingCallback) driveTokenClient._pendingCallback = pendingCallback;
    setBackupStatus("working", "⏳ Autenticando con Google…");
    driveIsSilentRenew = false;
    driveTokenClient.requestAccessToken({ prompt: "consent" });
  }

  /* Asegurarse de tener token válido antes de una operación */
  function ensureToken(callback){
    if (driveAccessToken && Date.now() < driveTokenExpiry){
      callback();
    } else {
      handleAuthClick(callback);
    }
  }

  /* Helper: mostrar mensaje en backupStatus */
  function setBackupStatus(type, text){
    var el = document.getElementById("backupStatus");
    if (!el) return;
    el.className = "backup-status" + (type ? " " + type : "");
    el.textContent = text;
    if (!type) el.style.display = "none";
  }

  /* ============= buildMasterBackupJSON: construye el objeto maestro ============= */
  async function buildMasterBackupJSON(){
    var rawState = await storageGet(STORAGE_KEY);
    var currentState = null;
    if (rawState){
      try { currentState = JSON.parse(rawState); } catch(e){ currentState = state; }
    } else {
      currentState = state;
    }
    var allEvidence = await dbReadAllWithCursor();
    var backup = {
      _meta: {
        version: 2,
        exportedAt: new Date().toISOString(),
        appName: "Bitácora — Hábitos",
        totalEvidenceKeys: Object.keys(allEvidence).length
      },
      state: currentState,
      evidenceByYear: {}
    };
    Object.keys(allEvidence).forEach(function(key){
      var yr = extractYearFromKey(key);
      if (!backup.evidenceByYear[yr]) backup.evidenceByYear[yr] = {};
      backup.evidenceByYear[yr][key] = allEvidence[key];
    });
    var logByYear = {};
    if (currentState && currentState.log){
      Object.keys(currentState.log).forEach(function(ds){
        var yr = ds.substring(0, 4);
        if (!logByYear[yr]) logByYear[yr] = {};
        logByYear[yr][ds] = currentState.log[ds];
      });
    }
    backup.logByYear = logByYear;
    return backup;
  }

  /* ============= syncToDrive: sube el backup a appDataFolder ============= */
  async function syncToDrive(){
    var btnSync    = document.getElementById("btnDriveSync");
    var btnRestore = document.getElementById("btnDriveRestore");
    if (btnSync)    btnSync.disabled    = true;
    if (btnRestore) btnRestore.disabled = true;

    try {
      setBackupStatus("working", "⏳ Preparando respaldo completo…");

      /* 1. Construir JSON */
      setBackupStatus("working", "⏳ Leyendo datos y evidencias…");
      var backup = await buildMasterBackupJSON();
      var jsonStr = JSON.stringify(backup, null, 2);

      /* 2. Buscar si ya existe el archivo en appDataFolder */
      setBackupStatus("working", "⏳ Comprobando respaldo existente en Drive…");
      var searchResp = await fetch(
        DRIVE_API + "?spaces=" + DRIVE_SPACES +
        "&fields=files(id,name,modifiedTime)" +
        "&q=name%3D%27" + encodeURIComponent(DRIVE_FILENAME) + "%27",
        { headers: { "Authorization": "Bearer " + driveAccessToken } }
      );
      if (!searchResp.ok){
        var errBody = await searchResp.text();
        throw new Error("Error buscando en Drive (" + searchResp.status + "): " + errBody);
      }
      var searchData = await searchResp.json();
      var existingFile = searchData.files && searchData.files.length > 0 ? searchData.files[0] : null;

      /* 3. Crear o actualizar el archivo */
      var boundary = "bitacora_boundary_" + Date.now();
      var metadata = JSON.stringify(
        existingFile
          ? { name: DRIVE_FILENAME }
          : { name: DRIVE_FILENAME, parents: [DRIVE_SPACES] }
      );
      var body =
        "--" + boundary + "\r\n" +
        "Content-Type: application/json; charset=UTF-8\r\n\r\n" +
        metadata + "\r\n" +
        "--" + boundary + "\r\n" +
        "Content-Type: application/json\r\n\r\n" +
        jsonStr + "\r\n" +
        "--" + boundary + "--";

      var uploadUrl, uploadMethod;
      if (existingFile){
        setBackupStatus("working", "⏳ Actualizando respaldo en Drive…");
        uploadUrl    = DRIVE_UPLOAD_API + "/" + existingFile.id + "?uploadType=multipart";
        uploadMethod = "PATCH";
      } else {
        setBackupStatus("working", "⏳ Creando nuevo respaldo en Drive…");
        uploadUrl    = DRIVE_UPLOAD_API + "?uploadType=multipart";
        uploadMethod = "POST";
      }

      var uploadResp = await fetch(uploadUrl, {
        method: uploadMethod,
        headers: {
          "Authorization": "Bearer " + driveAccessToken,
          "Content-Type": "multipart/related; boundary=" + boundary
        },
        body: body
      });

      if (!uploadResp.ok){
        var upErr = await uploadResp.text();
        throw new Error("Error subiendo a Drive (" + uploadResp.status + "): " + upErr);
      }

      var totalEv = Object.keys(backup._meta.totalEvidenceKeys !== undefined
        ? { length: backup._meta.totalEvidenceKeys }
        : {}).length;
      var evCount = backup._meta.totalEvidenceKeys || 0;
      var action  = existingFile ? "actualizado" : "creado";
      setBackupStatus("success",
        "✔ Respaldo " + action + " en Google Drive · " +
        evCount + " evidencias · " +
        new Date().toLocaleString("es")
      );
      showToast("✅ Respaldo " + action + " en Google Drive.");
    } catch(err){
      console.error("Drive sync error:", err);
      setBackupStatus("error", "✖ " + (err.message || err));
      showToast("Error al subir a Google Drive.");
    } finally {
      if (btnSync)    btnSync.disabled    = false;
      if (btnRestore) btnRestore.disabled = false;
    }
  }

  /* ============= restoreFromDrive: descarga y restaura el backup ============= */
  async function restoreFromDrive(){
    var btnSync    = document.getElementById("btnDriveSync");
    var btnRestore = document.getElementById("btnDriveRestore");
    if (btnSync)    btnSync.disabled    = true;
    if (btnRestore) btnRestore.disabled = true;

    try {
      /* 1. Buscar el archivo */
      setBackupStatus("working", "⏳ Buscando respaldo en Google Drive…");
      var searchResp = await fetch(
        DRIVE_API + "?spaces=" + DRIVE_SPACES +
        "&fields=files(id,name,modifiedTime)" +
        "&q=name%3D%27" + encodeURIComponent(DRIVE_FILENAME) + "%27",
        { headers: { "Authorization": "Bearer " + driveAccessToken } }
      );
      if (!searchResp.ok){
        var errBody = await searchResp.text();
        throw new Error("Error buscando en Drive (" + searchResp.status + "): " + errBody);
      }
      var searchData = await searchResp.json();
      if (!searchData.files || searchData.files.length === 0){
        setBackupStatus("error", "✖ No se encontró ningún respaldo previo en Google Drive.");
        showToast("No se encontró respaldo en Drive.");
        return;
      }
      var file = searchData.files[0];
      var modDate = file.modifiedTime ? new Date(file.modifiedTime).toLocaleString("es") : "—";
      setBackupStatus("working", "⏳ Respaldo encontrado (" + modDate + "). Descargando…");

      /* 2. Descargar contenido */
      var downloadResp = await fetch(
        DRIVE_API + "/" + file.id + "?alt=media",
        { headers: { "Authorization": "Bearer " + driveAccessToken } }
      );
      if (!downloadResp.ok){
        var dlErr = await downloadResp.text();
        throw new Error("Error descargando de Drive (" + downloadResp.status + "): " + dlErr);
      }
      var jsonText = await downloadResp.text();

      /* 3. Convertir a Blob/File e inyectar en importMasterBackup */
      setBackupStatus("working", "⏳ Restaurando datos…");
      var blob = new Blob([jsonText], { type: "application/json" });
      var virtualFile = new File([blob], DRIVE_FILENAME, { type: "application/json" });
      /* importMasterBackup se encarga de toda la limpieza y restauración en IndexedDB */
      await importMasterBackup(virtualFile);
      /* Nota: importMasterBackup ya setea su propio mensaje de éxito y recarga la página */

    } catch(err){
      console.error("Drive restore error:", err);
      setBackupStatus("error", "✖ " + (err.message || err));
      showToast("Error al restaurar desde Google Drive.");
      if (btnSync)    btnSync.disabled    = false;
      if (btnRestore) btnRestore.disabled = false;
    }
  }

  /* Inicializar GIS cuando el script esté disponible */
  function tryInitDriveClient(){
    if (typeof google !== "undefined" && google.accounts && google.accounts.oauth2){
      initDriveTokenClient();

      /* ── Auto-reconexión con persistencia de token ─────────────────────────
         Estrategia en 3 capas:
         1. Si el token guardado sigue siendo válido (< 1h), restaurarlo directamente
            sin ninguna llamada OAuth. El usuario ve "Conectado" de inmediato.
         2. Si el token expiró pero tenemos sesión guardada, intentar renovación
            silenciosa (prompt:'none'). Mostramos "Reconectando…" con un timeout
            de 6 segundos: si Google no responde (cookies bloqueadas en Chrome),
            pasamos a "Desconectado" sin error visible.
         3. Si no hay sesión guardada, arrancar desconectado normalmente. */
      var savedSession = loadDriveSession();
      if (savedSession){
        driveUserEmail = savedSession.email || null;

        /* Capa 1: ¿Tenemos un token guardado que todavía sirve? */
        var hasValidToken = savedSession.accessToken &&
                            savedSession.tokenExpiry &&
                            Date.now() < savedSession.tokenExpiry - 60000; /* margen 1 min */

        if (hasValidToken){
          /* Restaurar token directamente — sin pop-up, sin iframe */
          driveAccessToken = savedSession.accessToken;
          driveTokenExpiry = savedSession.tokenExpiry;
          console.log("[Drive] Token restaurado desde localStorage, válido hasta",
            new Date(driveTokenExpiry).toLocaleTimeString());
          updateDriveAuthUI();
          startTokenRefreshTimer();
        } else {
          /* Capa 2: token expirado → intentar renovación silenciosa */
          console.log("[Drive] Token expirado o ausente, intentando renovación silenciosa…");
          driveIsReconnecting = true;
          updateDriveAuthUI();

          /* MAGIA NINJA: Esperamos al primer toque de pantalla para eludir el bloqueador de popups */
          var triggerRenew = function() {
            if (driveIsReconnecting) {
              silentTokenRenew();
            }
            document.removeEventListener("click", triggerRenew);
            document.removeEventListener("touchstart", triggerRenew);
          };
          document.addEventListener("click", triggerRenew);
          document.addEventListener("touchstart", triggerRenew);
        }

      }
      /* Si no hay sesión guardada, la UI ya muestra "desconectado" por defecto */

    } else {
      setTimeout(tryInitDriveClient, 500);
    }
  }
  /* Disparar intento de init después de un pequeño delay para que los scripts async carguen */
  setTimeout(tryInitDriveClient, 800);

  /* ===================== Render principal ===================== */
  function render(){
    renderVoyageLine();
    document.querySelectorAll(".nav-btn").forEach(function(btn){
      btn.classList.toggle("active", btn.getAttribute("data-tab") === activeTab);
    });
    renderActiveTab();
  }

  function renderActiveTab(){
    var app  = document.getElementById("app");
    var html = "";
    if      (activeTab === "hoy")          html = renderHoy();
    else if (activeTab === "calendario")   html = renderCalendario();
    else if (activeTab === "habitos")      html = renderHabitos();
    else if (activeTab === "proyectos")    html = renderProyectos();
    else if (activeTab === "estadisticas") html = renderEstadisticas();
    app.innerHTML = html;

    /* ¡NUEVO! Actualiza el botón de Drive al volver a la pestaña */
    if (activeTab === "estadisticas") {
      updateDriveAuthUI();
    }
  }

  /* ===================== Eventos: clicks ===================== */
  document.addEventListener("click", function(e){
    /* Magia Ninja: Si el token está a menos de 5 min de caducar, lo renovamos aprovechando este toque */
    if (driveUserEmail && driveAccessToken && Date.now() > driveTokenExpiry - 300000) {
      silentTokenRenew();
    }

    /* Nav tabs */
    var navBtn = e.target.closest(".nav-btn");
    if (navBtn && navBtn.hasAttribute("data-tab")){
      activeTab = navBtn.getAttribute("data-tab");
      openReminderPanel = null;
      document.querySelectorAll(".nav-btn").forEach(function(b){ b.classList.toggle("active", b === navBtn); });
      renderActiveTab();
      return;
    }

    var el = e.target.closest("[data-action]");
    if (!el) return;
    var action = el.getAttribute("data-action");

    if (action === "toggle-task"){
      if (el.disabled) return;
      var ds = el.getAttribute("data-date");
      var id = el.getAttribute("data-id");
      var status = getStatus(ds, id);
      
      if (status === "done"){
        /* Aviso de seguridad antes de desmarcar */
        if (window.confirm("¿Seguro que quieres desmarcar esta tarea? Perderás el registro de tu evidencia.")){
          unmarkDone(ds, id);
        }
      } else {
        /* Pedir evidencia antes de marcar */
        openEvidenceModal(ds, id);
      }
    } else if (action === "view-evidence"){
      openViewEvidenceModal(el.getAttribute("data-date"), el.getAttribute("data-id"));

    } else if (action === "edit-evidence"){
      openEditEvidenceModal(el.getAttribute("data-date"), el.getAttribute("data-id"));

    } else if (action === "delete-task"){
      deleteOneoff(el.getAttribute("data-id"));

    } else if (action === "archive-habit"){
      archiveHabit(el.getAttribute("data-id"));

    } else if (action === "delete-routine"){
      deleteRoutine(el.getAttribute("data-id"));

    } else if (action === "complete-project"){
      /* Abrimos el modal. Usamos la palabra "project" como si fuera la fecha
         para que la base de datos sepa cómo clasificar esta evidencia */
      openEvidenceModal("project", el.getAttribute("data-id"));

    } else if (action === "delete-project"){
      deleteProject(el.getAttribute("data-id"));

    } else if (action === "reset-all"){
      resetAll();

    } else if (action === "toggle-reminder-panel"){
      var rk = el.getAttribute("data-rkey");
      openReminderPanel = (openReminderPanel === rk) ? null : rk;
      renderActiveTab();

    } else if (action === "save-reminder"){
      var saveDs  = el.getAttribute("data-date");
      var saveId  = el.getAttribute("data-id");
      var inputId = "rtime-" + reminderKey(saveDs, saveId).replace(/[|]/g,"_");
      var inp     = document.getElementById(inputId);
      var timeVal = inp ? inp.value : "";
      if (!timeVal){ showToast("Elegí una hora."); return; }
      requestNotifPermission(function(perm){
        setReminder(saveDs, saveId, timeVal);
        openReminderPanel = null;
        renderActiveTab();
        if (perm === "granted") showToast("Recordatorio guardado para las " + timeVal + ".");
        else if (perm === "denied") showToast("Guardado. Activá notificaciones en el navegador para recibirlo.");
        else showToast("Guardado. Exportá el .ics para agregarlo a tu calendario.");
      });

    } else if (action === "clear-reminder"){
      setReminder(el.getAttribute("data-date"), el.getAttribute("data-id"), null);
      openReminderPanel = null;
      renderActiveTab();
      showToast("Recordatorio eliminado.");

    } else if (action === "export-ics"){
      var icsDs   = el.getAttribute("data-date");
      var icsId   = el.getAttribute("data-id");
      var icsTasks = getTasksForDate(icsDs);
      var icsTask  = icsTasks.find(function(t){ return t.id === icsId; });
      if (icsTask) exportToIcs(icsTask.text, icsDs, getReminder(icsDs, icsId));

    } else if (action === "cal-select"){
      selectedCalendarDate = el.getAttribute("data-date");
      openReminderPanel = null;
      renderActiveTab();

    } else if (action === "cal-prev"){
      calendarViewDate.setMonth(calendarViewDate.getMonth()-1);
      renderActiveTab();

        } else if (action === "cal-next"){
      calendarViewDate.setMonth(calendarViewDate.getMonth()+1);
      renderActiveTab();
      
    /* --- NUEVAS CONEXIONES DE BACKUP --- */
    } else if (action === "backup-export"){
      exportMasterBackup();
      
    } else if (action === "backup-import-trigger"){
      /* Esto hace clic invisible en el input de archivo real */
      var fileInput = document.getElementById("backupFileInput");
      if(fileInput) fileInput.click();

    /* --- GOOGLE DRIVE --- */
    } else if (action === "drive-auth"){
      handleAuthClick(null);

    } else if (action === "drive-sync"){
      ensureToken(function(){
        syncToDrive();
      });

    } else if (action === "drive-restore"){
      ensureToken(function(){
        restoreFromDrive();
      });
    }
  });

  /* ===================== Eventos: changes (Inputs y Selects) ===================== */
  document.addEventListener("change", function(e){
    /* Seleccionar archivo de importación */
    if (e.target.id === "backupFileInput"){
      var file = e.target.files && e.target.files[0];
      if (file) {
        importMasterBackup(file);
        e.target.value = ""; /* Resetea el input por si quieres subir el mismo archivo después */
      }
    } 
    /* Cambiar el año histórico en el calendario */
    else if (e.target.getAttribute("data-action") === "cal-year-change") {
      var y = parseInt(e.target.value, 10);
      var currentY = new Date().getFullYear();
      calendarHistoricalYear = (y === currentY) ? null : y;
      renderActiveTab();
    }
  });

  /* ===================== Eventos: submits ===================== */
  document.addEventListener("submit", function(e){
    /* Tarea / hábito */
    var taskForm = e.target.closest('[data-action="add-task"]');
    if (taskForm){
      e.preventDefault();
      var text      = taskForm.elements["text"].value;
      var repeatEl  = taskForm.elements["repeat"];
      var repeat    = repeatEl ? repeatEl.checked : false;
      var date      = taskForm.getAttribute("data-date");
      addTask(text, date, repeat);
      taskForm.reset();
      return;
    }
    /* Hábito desde pestaña hábitos */
    var habitForm = e.target.closest('[data-action="add-habit"]');
    if (habitForm){
      e.preventDefault();
      var htext = habitForm.elements["text"].value;
      addTask(htext, todayStr(), true);
      habitForm.reset();
      return;
    }
    /* Rutina */
    var routineForm = e.target.closest('[data-action="add-routine"]');
    if (routineForm){
      e.preventDefault();
      var rtext = routineForm.elements["routineText"].value;
      var rtime = routineForm.elements["routineTime"].value;
      var checkboxes = routineForm.querySelectorAll('input[name="days"]:checked');
      var rdays = [];
      for (var i = 0; i < checkboxes.length; i++){ rdays.push(parseInt(checkboxes[i].value, 10)); }
      addRoutine(rtext, rdays, rtime);
      routineForm.reset();
      return;
    }
    /* Proyecto */
    var projectForm = e.target.closest('[data-action="add-project"]');
    if (projectForm){
      e.preventDefault();
      var ptext     = projectForm.elements["projectText"].value;
      var pdeadline = projectForm.elements["projectDeadline"].value;
      addProject(ptext, pdeadline);
      projectForm.reset();
      return;
    }
  });

  /* ===================== Arranque ===================== */
  init();
})();
</script>
