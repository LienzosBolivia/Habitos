<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bitácora — Hábitos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<!-- Google Identity Services + Google API Client -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js" async defer></script>
<style>
  :root{
    --ink-900:#0A1B27;
    --ink-850:#0F2333;
    --ink-800:#15324480;
    --ink-800-solid:#163141;
    --ink-700:#1E4257;
    --ink-650:#274d63;
    --brass-600:#A87B3C;
    --brass-500:#C9974A;
    --brass-300:#E3BD7C;
    --brass-100:#F3DFB8;
    --parchment:#F1E7CF;
    --parchment-dim:#C9BB98;
    --done:#5FA177;
    --done-dim:#23362C;
    --missed:#C1573D;
    --missed-dim:#3A2620;
    --text-light:#EDE6D6;
    --text-muted:#8FA6B2;
    --text-faint:#5E7886;
    --radius-sm:6px;
    --radius-md:10px;
    --radius-lg:18px;
    --font-display:'Fraunces', serif;
    --font-body:'IBM Plex Sans', sans-serif;
    --font-mono:'IBM Plex Mono', monospace;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--ink-900);
    background-image:
      radial-gradient(circle at 15% 0%, rgba(201,151,74,0.07), transparent 40%),
      radial-gradient(circle at 85% 100%, rgba(95,161,119,0.06), transparent 45%);
    color:var(--text-light);
    font-family:var(--font-body);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{font-family:var(--font-display); margin:0;}
  button{font-family:inherit;}
  ::selection{background:var(--brass-500); color:var(--ink-900);}

  button:focus-visible, input:focus-visible, textarea:focus-visible, [tabindex]:focus-visible{
    outline:2px solid var(--brass-300);
    outline-offset:2px;
  }

  /* ---------- Masthead ---------- */
  .masthead{
    padding:30px 20px 20px;
    text-align:center;
    border-bottom:1px solid var(--ink-700);
    background:linear-gradient(180deg, var(--ink-850), var(--ink-900));
  }
  .masthead h1{
    font-weight:900;
    font-size:30px;
    letter-spacing:0.14em;
    color:var(--brass-300);
    text-transform:uppercase;
  }
  .masthead .subtitle{
    margin-top:4px;
    font-size:11px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--text-muted);
  }
  .masthead .voyage-line{
    margin-top:14px;
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--text-faint);
    letter-spacing:0.04em;
  }
  .masthead .voyage-line strong{color:var(--brass-300); font-weight:600;}

  /* ---------- Layout ---------- */
  main{
    max-width:680px;
    margin:0 auto;
    width:100%;
    padding:20px 16px 110px;
  }
  .tab-panel{display:none;}
  .tab-panel.active{display:block; animation:fadeIn .25s ease;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);}}

  section.block{margin-bottom:26px;}
  .block-title{
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:0.1em;
    color:var(--text-muted);
    margin-bottom:10px;
    font-weight:600;
  }

  /* ---------- Progress / Hero ---------- */
  .progress-hero{
    background:var(--ink-800-solid);
    border:1px solid var(--ink-700);
    border-radius:var(--radius-lg);
    padding:20px;
    margin-bottom:20px;
    position:relative;
    overflow:hidden;
  }
  .progress-hero .ph-row{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:12px;}
  .progress-hero .ph-count{font-family:var(--font-mono); font-size:26px; color:var(--brass-300); font-weight:600;}
  .progress-hero .ph-count span{font-size:14px; color:var(--text-muted); font-weight:400;}
  .progress-hero .ph-pct{font-family:var(--font-mono); font-size:14px; color:var(--text-muted);}
  .progress-track{height:14px; background:var(--ink-700); border-radius:8px; overflow:hidden;}
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg, var(--brass-600), var(--brass-300));
    border-radius:8px;
    transition:width .5s cubic-bezier(.2,.8,.2,1);
  }

  .stamp-wrap{display:flex; justify-content:center; margin:18px 0 4px;}
  .stamp{
    width:108px; height:108px;
    border-radius:50%;
    border:3px double var(--brass-500);
    display:flex; align-items:center; justify-content:center;
    flex-direction:column;
    transform:rotate(-9deg) scale(1);
    color:var(--brass-300);
    text-align:center;
    box-shadow:0 0 0 4px rgba(201,151,74,0.08);
  }
  .stamp .stamp-main{font-family:var(--font-mono); font-weight:700; font-size:13px; letter-spacing:0.1em;}
  .stamp .stamp-sub{font-size:9px; letter-spacing:0.08em; color:var(--parchment-dim); margin-top:2px; text-transform:uppercase;}
  @media (prefers-reduced-motion: no-preference){
    .stamp-enter{animation:stampThud .42s cubic-bezier(.2,1.4,.4,1);}
  }
  @keyframes stampThud{
    0%{transform:rotate(-9deg) scale(1.9); opacity:0;}
    60%{transform:rotate(-9deg) scale(0.94); opacity:1;}
    100%{transform:rotate(-9deg) scale(1); opacity:1;}
  }

  /* ---------- Forms ---------- */
  .add-form{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; align-items:center;}
  .add-form input[type="text"],
  .add-form input[type="date"]{
    flex:1; min-width:140px;
    background:var(--ink-800-solid);
    border:1px solid var(--ink-700);
    color:var(--text-light);
    padding:11px 13px;
    border-radius:var(--radius-sm);
    font-size:14px;
    color-scheme:dark;
  }
  .add-form input[type="text"]::placeholder{color:var(--text-faint);}
  .repeat-toggle{
    display:flex; align-items:center; gap:6px;
    font-size:12px; color:var(--text-muted);
    white-space:nowrap;
    cursor:pointer;
  }
  .repeat-toggle input{accent-color:var(--brass-500); width:15px; height:15px;}
  button.primary{
    background:var(--brass-500);
    color:var(--ink-900);
    font-weight:600;
    border:none;
    padding:11px 18px;
    border-radius:var(--radius-sm);
    cursor:pointer;
    font-size:14px;
    transition:background .15s ease;
  }
  button.primary:hover{background:var(--brass-300);}
  button.btn-secondary{
    background:transparent;
    color:var(--text-muted);
    border:1px solid var(--ink-650);
    padding:10px 16px;
    border-radius:var(--radius-sm);
    cursor:pointer;
    font-size:14px;
    transition:border-color .15s, color .15s;
  }
  button.btn-secondary:hover{border-color:var(--brass-500); color:var(--text-light);}

  /* ---------- Task items ---------- */
  .task-list{display:flex; flex-direction:column; gap:8px;}
  .task-item{
    display:flex; align-items:center; gap:12px;
    background:var(--ink-800-solid);
    border:1px solid var(--ink-700);
    border-radius:var(--radius-md);
    padding:11px 13px;
  }
  .task-stamp-btn{
    flex:0 0 30px; width:30px; height:30px;
    border-radius:50%;
    border:2px solid var(--text-faint);
    background:transparent;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    color:transparent;
    transition:transform .15s ease;
  }
  .task-stamp-btn:hover{transform:scale(1.07);}
  .task-stamp-btn svg{width:16px; height:16px;}
  .task-stamp-btn.is-done{background:var(--done); border-color:var(--done); color:var(--ink-900);}
  .task-stamp-btn.is-missed{background:var(--missed-dim); border-color:var(--missed);}
  .task-stamp-btn:disabled{opacity:.45; cursor:not-allowed;}
  .task-text{flex:1; font-size:14.5px; color:var(--text-light); line-height:1.4;}
  .task-text.is-done{color:var(--text-muted); text-decoration:line-through;}
  .badge{
    font-family:var(--font-mono);
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--brass-300);
    border:1px solid var(--ink-650);
    border-radius:4px;
    padding:2px 6px;
    white-space:nowrap;
  }
  .badge.badge-routine{color:var(--done); border-color:var(--done-dim);}
  .task-delete-btn{
    flex:0 0 auto;
    background:none; border:none;
    color:var(--text-faint);
    font-size:18px;
    line-height:1;
    cursor:pointer;
    padding:0 2px;
  }
  .task-delete-btn:hover{color:var(--missed);}

  /* Evidence eye button */
  .task-eye-btn{
    flex:0 0 auto;
    background:none; border:none;
    color:var(--done);
    cursor:pointer;
    padding:0 2px;
    display:flex; align-items:center;
    opacity:.8;
    transition:opacity .15s;
  }
  .task-eye-btn:hover{opacity:1;}
  .task-eye-btn svg{width:15px; height:15px;}

  /* Evidence pencil (edit) button */
  .task-pencil-btn{
    flex:0 0 auto;
    background:none; border:none;
    color:var(--brass-500);
    cursor:pointer;
    padding:0 2px;
    display:flex; align-items:center;
    opacity:.7;
    transition:opacity .15s;
  }
  .task-pencil-btn:hover{opacity:1;}
  .task-pencil-btn svg{width:14px; height:14px;}

  /* Drive auto-sync status badge */
  .drive-autosync-badge{
    display:inline-flex; align-items:center; gap:5px;
    font-family:var(--font-mono); font-size:10.5px;
    color:var(--text-faint);
    padding:4px 10px;
    border-radius:20px;
    border:1px solid var(--ink-700);
    background:var(--ink-800-solid);
    transition:color .3s, border-color .3s;
  }
  .drive-autosync-badge.syncing{
    color:var(--brass-300);
    border-color:rgba(168,123,60,0.35);
    animation:pulseBadge 1.2s ease-in-out infinite;
  }
  .drive-autosync-badge.synced{
    color:var(--done);
    border-color:rgba(95,161,119,0.35);
  }
  .drive-autosync-badge.error{
    color:var(--missed);
    border-color:rgba(193,87,61,0.35);
  }
  @keyframes pulseBadge{
    0%,100%{opacity:1;} 50%{opacity:.55;}
  }
  .autosync-dot{
    width:6px; height:6px; border-radius:50%;
    background:currentColor; flex-shrink:0;
  }

  .empty-state{
    text-align:center;
    padding:32px 16px;
    color:var(--text-muted);
    font-size:14px;
    border:1px dashed var(--ink-700);
    border-radius:var(--radius-md);
  }
  .empty-state strong{display:block; color:var(--text-light); margin-bottom:4px; font-size:15px;}

  /* ---------- Calendar ---------- */
  .cal-nav{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
  .cal-nav h2{font-size:17px; color:var(--brass-300); text-transform:capitalize;}
  .cal-nav button{
    background:var(--ink-800-solid);
    border:1px solid var(--ink-700);
    color:var(--text-light);
    width:32px; height:32px;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
  }
  .cal-nav button:hover{border-color:var(--brass-500);}
  .cal-weekdays{display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-bottom:6px;}
  .cal-weekdays span{text-align:center; font-size:10px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.05em;}
  .cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:4px;}
  .cal-day{
    aspect-ratio:1/1;
    border-radius:8px;
    border:1px solid var(--ink-700);
    background:var(--ink-800-solid);
    color:var(--text-muted);
    font-family:var(--font-mono);
    font-size:12px;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    position:relative;
  }
  .cal-day:hover{border-color:var(--brass-500);}
  .cal-day.empty{visibility:hidden; cursor:default;}
  .cal-day.is-today{border-color:var(--brass-300); font-weight:600;}
  .cal-day.selected{box-shadow:0 0 0 2px var(--brass-300) inset;}
  .cal-day.level-1{background:var(--missed-dim); color:var(--parchment-dim);}
  .cal-day.level-2{background:#3a2f17; color:var(--brass-100);}
  .cal-day.level-3{background:#5a4520; color:var(--brass-100);}
  .cal-day.level-4{background:var(--brass-500); color:var(--ink-900); font-weight:600;}

  .day-detail{
    margin-top:18px;
    padding-top:16px;
    border-top:1px solid var(--ink-700);
  }
  .day-detail h3{font-size:14px; color:var(--text-light); margin-bottom:10px; font-weight:600;}
  .future-note{font-size:12px; color:var(--text-faint); margin-bottom:10px;}

  /* ---------- Habitos ---------- */
  .habit-row{
    background:var(--ink-800-solid);
    border:1px solid var(--ink-700);
    border-radius:var(--radius-md);
    padding:13px 15px;
    margin-bottom:8px;
  }
  .habit-row .hr-top{display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .habit-row .hr-text{font-size:15px; color:var(--text-light); font-weight:500;}
  .habit-row .hr-archive{
    background:none; border:1px solid var(--ink-650);
    color:var(--text-muted); font-size:11px;
    padding:5px 10px; border-radius:6px; cursor:pointer; white-space:nowrap;
  }
  .habit-row .hr-archive:hover{border-color:var(--missed); color:var(--missed);}
  .habit-row .hr-stats{
    display:flex; gap:16px; margin-top:8px;
    font-family:var(--font-mono); font-size:11.5px; color:var(--text-muted);
  }
  .habit-row .hr-stats b{color:var(--brass-300); font-weight:600;}

  /* ---------- Rutinas Semanales ---------- */
  .day-picker{
    display:flex; gap:5px; flex-wrap:wrap;
    margin:8px 0 12px;
  }
  .day-btn-label{
    display:flex; flex-direction:column; align-items:center; cursor:pointer;
  }
  .day-btn-label input[type="checkbox"]{display:none;}
  .day-btn-chip{
    width:34px; height:34px;
    border-radius:50%;
    border:1px solid var(--ink-650);
    background:var(--ink-800-solid);
    color:var(--text-faint);
    font-family:var(--font-mono);
    font-size:11px; font-weight:600;
    display:flex; align-items:center; justify-content:center;
    transition:background .15s, border-color .15s, color .15s;
    user-select:none;
  }
  .day-btn-label input:checked + .day-btn-chip{
    background:var(--done-dim);
    border-color:var(--done);
    color:var(--done);
  }
  .day-btn-label:hover .day-btn-chip{border-color:var(--brass-500);}

  .routine-item{
    background:var(--ink-800-solid);
    border:1px solid var(--ink-700);
    border-radius:var(--radius-md);
    padding:12px 14px;
    margin-bottom:8px;
    display:flex; align-items:center; gap:10px;
  }
  .routine-item-body{flex:1; min-width:0;}
  .routine-item-text{font-size:14px; color:var(--text-light); font-weight:500;}
  .routine-item-meta{
    display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; align-items:center;
  }
  .routine-day-chip{
    font-family:var(--font-mono); font-size:10px;
    background:var(--done-dim); color:var(--done);
    border-radius:20px; padding:2px 8px;
  }
  .routine-time-chip{
    font-family:var(--font-mono); font-size:10px;
    color:var(--brass-300); background:rgba(168,123,60,0.12);
    border-radius:20px; padding:2px 8px;
  }
  .routine-delete-btn{
    background:none; border:none;
    color:var(--text-faint); font-size:18px; cursor:pointer; padding:0 2px;
  }
  .routine-delete-btn:hover{color:var(--missed);}
  .add-form input[type="time"]{
    background:var(--ink-800-solid);
    border:1px solid var(--ink-700);
    color:var(--text-light);
    padding:11px 10px;
    border-radius:var(--radius-sm);
    font-size:14px;
    font-family:var(--font-mono);
    color-scheme:dark;
  }

  /* ---------- Proyectos ---------- */
  .project-item{
    background:var(--ink-800-solid);
    border:1px solid var(--ink-700);
    border-radius:var(--radius-md);
    padding:14px 16px;
    margin-bottom:10px;
  }
  .project-item.is-completed{opacity:.6;}
  .project-header{display:flex; align-items:flex-start; justify-content:space-between; gap:10px;}
  .project-name{
    font-size:15px; font-weight:600; color:var(--text-light);
    font-family:var(--font-display);
    flex:1;
  }
  .project-item.is-completed .project-name{
    text-decoration:line-through; color:var(--text-muted);
  }
  .project-meta{
    display:flex; gap:12px; margin-top:8px; flex-wrap:wrap;
    font-family:var(--font-mono); font-size:11.5px; color:var(--text-muted);
    align-items:center;
  }
  .project-deadline-badge{
    display:inline-flex; align-items:center; gap:4px;
    font-family:var(--font-mono); font-size:11px;
    padding:3px 9px; border-radius:20px;
    border:1px solid var(--ink-650);
  }
  .project-deadline-badge.urgent{border-color:var(--missed); color:var(--missed);}
  .project-deadline-badge.soon{border-color:var(--brass-500); color:var(--brass-300);}
  .project-deadline-badge.ok{border-color:var(--done); color:var(--done);}
  .project-deadline-badge.done-badge{border-color:var(--ink-650); color:var(--text-faint);}
  .project-actions{display:flex; gap:6px; flex-shrink:0;}
  .btn-complete-project{
    background:none; border:1px solid var(--done);
    color:var(--done); font-size:11px; padding:5px 10px;
    border-radius:6px; cursor:pointer; white-space:nowrap; font-family:inherit;
  }
  .btn-complete-project:hover{background:var(--done-dim);}
  .btn-delete-project{
    background:none; border:1px solid var(--ink-650);
    color:var(--text-faint); font-size:11px; padding:5px 10px;
    border-radius:6px; cursor:pointer; white-space:nowrap; font-family:inherit;
  }
  .btn-delete-project:hover{border-color:var(--missed); color:var(--missed);}
  .section-divider{
    margin:20px 0 16px;
    padding-top:16px;
    border-top:1px solid var(--ink-700);
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.1em;
    color:var(--text-faint);
    font-weight:600;
  }

  /* ---------- Stats ---------- */
  .stat-grid{display:grid; grid-template-columns:repeat(auto-fit, minmax(125px,1fr)); gap:10px;}
  .stat-card{
    background:var(--ink-800-solid);
    border:1px solid var(--ink-700);
    border-radius:var(--radius-md);
    padding:14px;
    text-align:center;
  }
  .stat-card .sc-value{font-family:var(--font-mono); font-size:23px; color:var(--brass-300); font-weight:600;}
  .stat-card .sc-label{font-size:10.5px; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-muted); margin-top:5px;}

  .bar-chart{display:flex; align-items:flex-end; gap:8px; height:110px; padding-top:10px;}
  .bar-col{flex:1; display:flex; flex-direction:column; align-items:center; height:100%; justify-content:flex-end; gap:6px;}
  .bar-fill-wrap{flex:1; display:flex; align-items:flex-end; width:100%; justify-content:center;}
  .bar-fill{
    width:55%;
    min-height:3px;
    background:linear-gradient(180deg, var(--brass-300), var(--brass-600));
    border-radius:4px 4px 0 0;
    transition:height .4s ease;
  }
  .bar-col .bar-label{font-family:var(--font-mono); font-size:9.5px; color:var(--text-faint); text-transform:uppercase;}

  .heatmap-scroll{overflow-x:auto; padding-bottom:6px;}
  .heatmap{display:grid; grid-auto-flow:column; grid-template-rows:repeat(7,11px); gap:3px;}
  .heat-cell{width:11px; height:11px; border-radius:2px; background:var(--ink-700);}
  .heat-cell.level-1{background:var(--missed-dim);}
  .heat-cell.level-2{background:#3a2f17;}
  .heat-cell.level-3{background:#5a4520;}
  .heat-cell.level-4{background:var(--brass-500);}
  .heat-legend{display:flex; align-items:center; gap:6px; margin-top:10px; font-size:10.5px; color:var(--text-faint);}
  .heat-legend .heat-cell{cursor:default;}

  .reset-row{margin-top:30px; text-align:center;}
  .reset-link{
    background:none; border:none;
    color:var(--text-faint);
    font-size:11.5px;
    text-decoration:underline;
    cursor:pointer;
  }
  .reset-link:hover{color:var(--missed);}

  /* ---------- Bottom nav ---------- */
  .bottom-nav{
    position:fixed; bottom:0; left:0; right:0;
    background:var(--ink-850);
    border-top:1px solid var(--ink-700);
    display:flex; justify-content:center;
    z-index:50;
    padding-bottom:env(safe-area-inset-bottom);

<body>

<header class="masthead">

<script>
(function(){
  "use strict";

  /* ===================== Constantes ===================== */

  var WD_SHORT = ["dom","lun","mar","mié","jue","vie","sáb"];

  /* ===================== Estado global ===================== */

  var autoSyncDebounceTimer = null;
  var lastAutoSyncTime      = null;

  /* ===================== IndexedDB ===================== */
  var db = null;

  function initDB(){
    return new Promise(function(resolve, reject){
      if (!window.indexedDB){ reject(new Error("No IndexedDB")); return; }
      var req = window.indexedDB.open("BitacoraDB", 1);
      req.onupgradeneeded = function(e){
        e.target.result.createObjectStore("evidence");
      };
      req.onsuccess = function(e){ db = e.target.result; resolve(db); };
      req.onerror   = function(){ reject(req.error); };
    });
  }

  function dbSet(key, value){
    return new Promise(function(resolve, reject){
      if (!db){ resolve(false); return; }
      try {
        var tx  = db.transaction("evidence", "readwrite");
        var store = tx.objectStore("evidence");
        store.put(value, key);
        tx.oncomplete = function(){ resolve(true); };
        tx.onerror    = function(){ reject(tx.error); };
      } catch(e){ reject(e); }
    });
  }

  function dbGet(key){
    return new Promise(function(resolve){
      if (!db){ resolve(null); return; }
      try {
        var tx  = db.transaction("evidence", "readonly");
        var req = tx.objectStore("evidence").get(key);
        req.onsuccess = function(){ resolve(req.result != null ? req.result : null); };
        req.onerror   = function(){ resolve(null); };
      } catch(e){ resolve(null); }
    });
  }

  /* ===================== Utilidades de fecha ===================== */
  function pad(n){ return n < 10 ? "0" + n : "" + n; }
  function dateToStr(d){ return d.getFullYear() + "-" + pad(d.getMonth()+1) + "-" + pad(d.getDate()); }
  function strToDate(s){
    var p = s.split("-");
    return new Date(parseInt(p[0],10), parseInt(p[1],10)-1, parseInt(p[2],10));
  }
  function todayStr(){ return dateToStr(new Date()); }
  function addDays(ds, n){ var d = strToDate(ds); d.setDate(d.getDate()+n); return dateToStr(d); }
  function formatDateLong(ds){
    var d = strToDate(ds);
    return ["domingo","lunes","martes","miércoles","jueves","viernes","sábado"][d.getDay()] +
           " " + d.getDate() + " de " + MONTHS[d.getMonth()] + " de " + d.getFullYear();
  }
  function formatDateShort(ds){
    var d = strToDate(ds);
    return d.getDate() + " " + MONTHS[d.getMonth()].slice(0,3);
  }
  function dateRangeArray(startStr, endStr){
    var arr = [], d = strToDate(startStr), end = strToDate(endStr), guard = 0;
    while (d <= end && guard < 5000){ arr.push(dateToStr(d)); d.setDate(d.getDate()+1); guard++; }
    return arr;
  }
  function daysUntil(ds){
    return Math.round((strToDate(ds) - strToDate(todayStr())) / 86400000);
  }

  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c];
    });
  }
  function capitalize(s){ return s.charAt(0).toUpperCase() + s.slice(1); }

  /* ===================== Almacenamiento ===================== */
  function hasCloudStorage(){
    return typeof window.storage === "object" && window.storage && typeof window.storage.get === "function";
  }
  function storageGet(key){
    return new Promise(function(resolve){
      if (hasCloudStorage()){
        window.storage.get(key, false).then(function(r){ resolve(r ? r.value : null); }).catch(function(){ resolve(null); });
      } else {
        try{ resolve(window.localStorage.getItem(key)); } catch(e){ resolve(null); }
      }
    });
  }
  function storageSet(key, value){
    return new Promise(function(resolve){
      if (hasCloudStorage()){
        window.storage.set(key, value, false).then(function(){ resolve(true); })
          .catch(function(){ showToast("No se pudo guardar la bitácora."); resolve(false); });
      } else {
        try{ window.localStorage.setItem(key, value); resolve(true); }
        catch(e){ showToast("No se pudo guardar la bitácora."); resolve(false); }
      }
    });
  }

  function defaultState(){
    return {
      firstUseDate: todayStr(),
      habits: [],
      oneoff: [],
      log: {},
      reminders: {},
      projects: [],
      routines: []
    };
  }

    /* ===================== Guardado Inteligente (Smart Sync) ===================== */
  var bitacora_needs_sync = false;

  function persist(){ 
    return storageSet(STORAGE_KEY, JSON.stringify(state)).then(function(){ 
      bitacora_needs_sync = true;
      try { localStorage.setItem("bitacora_needs_sync", "true"); } catch(e){}
      setAutoSyncBadge("syncing", "Cambios pendientes de subir...");
    }); 
  }

  /* El navegador avisa automáticamente cuando cambias de pestaña o minimizas la app */
  document.addEventListener("visibilitychange", function() {
    if (document.visibilityState === 'hidden' && bitacora_needs_sync) {
      autoSyncToDrive();
    }
  });

  /* Al arrancar la app, revisamos si quedó algo pendiente de la sesión anterior */
  function checkPendingSyncOnLoad(){
    try {
      if (localStorage.getItem("bitacora_needs_sync") === "true") {
        bitacora_needs_sync = true;
        autoSyncToDrive();
      }
    } catch(e){}

  function setAutoSyncBadge(state, text){
    var el = document.getElementById("driveAutoSyncBadge");
    if (!el) return;
    el.className = "drive-autosync-badge" + (state ? " " + state : "");
    var dot = el.querySelector(".autosync-dot");
    var lbl = el.querySelector(".autosync-label");
    if (lbl) lbl.textContent = text;
  }

  async function autoSyncToDrive(){
    /* Solo sincronizar si hay token válido — no interrumpir al usuario */
    if (!driveAccessToken || Date.now() >= driveTokenExpiry) return;
    setAutoSyncBadge("syncing", "Sincronizando…");
    try {
      var backup  = await buildMasterBackupJSON();
      var jsonStr = JSON.stringify(backup);
      var searchResp = await fetch(
        DRIVE_API + "?spaces=" + DRIVE_SPACES +
        "&fields=files(id,name)" +
        "&q=name%3D%27" + encodeURIComponent(DRIVE_FILENAME) + "%27",
        { headers: { "Authorization": "Bearer " + driveAccessToken } }
      );
      if (!searchResp.ok) throw new Error("search " + searchResp.status);
      var searchData   = await searchResp.json();
      var existingFile = searchData.files && searchData.files.length > 0 ? searchData.files[0] : null;
      var boundary     = "ab_" + Date.now();
      var metadata     = JSON.stringify(
        existingFile
          ? { name: DRIVE_FILENAME }
          : { name: DRIVE_FILENAME, parents: [DRIVE_SPACES] }
      );
      var body =
        "--" + boundary + "\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n" +
        metadata + "\r\n--" + boundary + "\r\nContent-Type: application/json\r\n\r\n" +
        jsonStr + "\r\n--" + boundary + "--";
      var url    = existingFile
        ? DRIVE_UPLOAD_API + "/" + existingFile.id + "?uploadType=multipart"
        : DRIVE_UPLOAD_API + "?uploadType=multipart";
      var method = existingFile ? "PATCH" : "POST";
      var upResp = await fetch(url, {
        method: method,
        headers: { "Authorization": "Bearer " + driveAccessToken, "Content-Type": "multipart/related; boundary=" + boundary },
        body: body
      });
      if (!upResp.ok) throw new Error("upload " + upResp.status);
      lastAutoSyncTime = new Date();
      var timeStr = lastAutoSyncTime.toLocaleDateString("es-BO") + " " +
                    lastAutoSyncTime.toLocaleTimeString("es-BO", { hour:"2-digit", minute:"2-digit" });
      setAutoSyncBadge("synced", "Respaldo automático: " + timeStr);
      
      /* Apagamos la bandera porque ya está todo seguro en la nube */
      bitacora_needs_sync = false;
      try { localStorage.setItem("bitacora_needs_sync", "false"); } catch(e){}
      
    } catch(err){
      console.warn("autoSync error:", err);
      setAutoSyncBadge("error", "Sin sincronizar");
    }
  }

  function init(){
    var dbPromise = initDB().catch(function(){ db = null; return null; });
    var statePromise = storageGet(STORAGE_KEY);
    Promise.all([statePromise, dbPromise]).then(function(results){
      var raw = results[0];
      if (raw){
        try{ state = JSON.parse(raw); } catch(e){ state = defaultState(); }
      } else {
        state = defaultState();
      }
      /* Normalizar campos */
      state.habits       = state.habits       || [];
      state.oneoff       = state.oneoff       || [];
      state.log          = state.log          || {};
      state.firstUseDate = state.firstUseDate || todayStr();
      state.reminders    = state.reminders    || {};
      state.projects     = state.projects     || [];
      state.routines     = state.routines     || [];
      selectedCalendarDate = todayStr();
      persist();
      scheduleTodayReminders();
      checkPendingSyncOnLoad();
      render();
    });
  }

  /* ===================== Lógica de tareas ===================== */
  function getTasksForDate(ds){
    var tasks = [];
    /* Hábitos diarios */
    state.habits.forEach(function(h){
      if (h.archivedAt && ds > h.archivedAt) return;
      if (ds >= h.createdAt) tasks.push({ id:h.id, text:h.text, type:"habit" });
    });
    /* Tareas one-off */
    state.oneoff.forEach(function(o){
      if (o.date === ds) tasks.push({ id:o.id, text:o.text, type:"oneoff" });
    });
    /* Rutinas semanales: inyección por día */
    var dayOfWeek = strToDate(ds).getDay(); // 0=Dom ... 6=Sáb
    state.routines.forEach(function(r){
      if (r.days && r.days.indexOf(dayOfWeek) !== -1){
        tasks.push({ id:r.id, text:r.text, type:"routine", routineTime: r.time || null });
      }
    });
    return tasks;
  }

  function getStatus(ds, id){
    if (state.log[ds] && state.log[ds][id]) return "done";
    if (ds < todayStr()) return "missed";
    return "pending";
  }

  function dayStats(ds){
    var tasks = getTasksForDate(ds);
    var done = 0;
    tasks.forEach(function(t){ if (getStatus(ds, t.id) === "done") done++; });
    return { total: tasks.length, done: done };
  }

   /**
   * Marcar como hecha o completada.
   * Llamado desde saveEvidence() después de guardar en IDB.
   */
  function markDone(ds, id){
    if (ds === "project") {
      var p = state.projects.find(function(x){ return x.id === id; });
      if (p){ 
        p.status = "completed"; 
        p.completedAt = todayStr(); 
      }
    } else {
      if (!state.log[ds]) state.log[ds] = {};
      state.log[ds][id] = true;
    }
    persist();
    renderActiveTab();
  }

  /**
   * Desmarcar (toggle off). Directo, sin evidencia.
   */
  function unmarkDone(ds, id){
    if (state.log[ds]) delete state.log[ds][id];
    if (state.log[ds] && Object.keys(state.log[ds]).length === 0) delete state.log[ds];
    persist();
    renderActiveTab();
  }

  function addTask(text, date, repeat){

    if (!text) return;

      state.habits.push({ id:uid(), text:text, createdAt:date });

      state.oneoff.push({ id:uid(), text:text, date:date });

  /* ===================== Estadísticas ===================== */
  function computeGlobalStats(){
    var total = 0, done = 0, missed = 0;
    dateRangeArray(state.firstUseDate, todayStr()).forEach(function(ds){
      getTasksForDate(ds).forEach(function(t){
        total++;
        var st = getStatus(ds, t.id);
        if (st === "done") done++;
        else if (st === "missed") missed++;
      });
    });
    var resolved = done + missed;
    var pct = resolved ? Math.round((done/resolved)*100) : 0;
    return { total: total, done: done, missed: missed, pct: pct };
  }
  function heatLevel(ds){
    var s = dayStats(ds);
    if (s.total === 0) return 0;
    var ratio = s.done / s.total;
    if (ratio >= 1) return 4;
    if (ratio >= 0.5) return 3;
    if (ratio > 0) return 2;
    return 1;
  }
  function computeCurrentStreak(){
    var today = todayStr();
    var ts = dayStats(today);
    var cursor = strToDate(today);
    if (!(ts.total > 0 && ts.done === ts.total)) cursor.setDate(cursor.getDate()-1);
    var streak = 0, guard = 0;
    while (guard < 5000){
      var ds = dateToStr(cursor);
      if (ds < state.firstUseDate) break;
      var s = dayStats(ds);
      if (s.total === 0){ cursor.setDate(cursor.getDate()-1); guard++; continue; }
      if (s.done === s.total){ streak++; cursor.setDate(cursor.getDate()-1); }
      else break;
      guard++;
    }
    return streak;
  }
  function computeBestStreak(){
    var best = 0, run = 0;
    var today = todayStr();
    dateRangeArray(state.firstUseDate, today).forEach(function(ds){
      if (ds === today) return;
      var s = dayStats(ds);
      if (s.total === 0) return;
      if (s.done === s.total){ run++; if (run > best) best = run; }
      else run = 0;
    });
    var ts = dayStats(today);
    if (ts.total > 0 && ts.done === ts.total){ run++; if (run > best) best = run; }
    return best;
  }
  function habitStreak(habit){
    var cursor = strToDate(todayStr());
    var streak = 0, guard = 0;
    var todayDs = todayStr();
    if (getStatus(todayDs, habit.id) !== "done") cursor.setDate(cursor.getDate()-1);
    while (guard < 5000){
      var ds = dateToStr(cursor);
      if (ds < habit.createdAt) break;
      if (getStatus(ds, habit.id) === "done"){ streak++; cursor.setDate(cursor.getDate()-1); }
      else break;
      guard++;
    }
    return streak;
  }
  function habitCompletionRate(habit){
    var today = todayStr();
    var endEx = addDays(today, -1);
    var dates = habit.createdAt <= endEx ? dateRangeArray(habit.createdAt, endEx) : [];
    if (getStatus(today, habit.id) === "done") dates.push(today);
    if (dates.length === 0) return null;
    var done = 0;
    dates.forEach(function(ds){ if (getStatus(ds, habit.id) === "done") done++; });
    return Math.round((done/dates.length)*100);
  }

  /* ===================== Recordatorios por tarea ===================== */
  var reminderTimers = {};

  function reminderKey(ds, taskId){ return ds + "|" + taskId; }
  function getReminder(ds, taskId){
    return (state.reminders && state.reminders[reminderKey(ds, taskId)]) || null;
  }
  function setReminder(ds, taskId, time){
    if (!state.reminders) state.reminders = {};
    if (time){ state.reminders[reminderKey(ds, taskId)] = time; }
    else { delete state.reminders[reminderKey(ds, taskId)]; }
    persist();
    scheduleTodayReminders();
  }
  function scheduleTodayReminders(){
    Object.keys(reminderTimers).forEach(function(k){ clearTimeout(reminderTimers[k]); });
    reminderTimers = {};
    if (!state.reminders || !("Notification" in window) || Notification.permission !== "granted") return;
    var today = todayStr(), now = new Date();
    Object.keys(state.reminders).forEach(function(key){
      var parts = key.split("|"), ds = parts[0], taskId = parts[1];
      if (ds !== today) return;
      var timeStr = state.reminders[key];
      if (!timeStr) return;
      var tp = timeStr.split(":");
      var target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), +tp[0], +tp[1], 0);
      var delay = target - now;
      if (delay < 0) return;
      reminderTimers[key] = setTimeout(function(){
        var tasks = getTasksForDate(today);
        var task = tasks.find(function(t){ return t.id === taskId; });
        if (!task || getStatus(today, taskId) === "done") return;
        try { new Notification("⏰ Bitácora — Recordatorio", { body: task.text, tag: "bitacora-" + key }); } catch(e){}
      }, delay);
    });
  }
  function requestNotifPermission(callback){
    if (!("Notification" in window)){ callback("unsupported"); return; }
    if (Notification.permission === "granted"){ callback("granted"); return; }
    if (Notification.permission === "denied"){ callback("denied"); return; }
    Notification.requestPermission().then(function(p){ callback(p); });
  }

  /* ===================== ICS / Google Calendar ===================== */
  function exportToIcs(taskText, ds, timeStr){
    var d = strToDate(ds);
    var y = d.getFullYear(), mo = pad(d.getMonth()+1), day = pad(d.getDate());
    var dates;
    var ctz = "America/La_Paz";
    if (timeStr){
      var tp = timeStr.split(":");
      var h = pad(+tp[0]), m = pad(+tp[1]);
      var dtStart = y + mo + day + "T" + h + m + "00";
      var totalMin = +tp[0]*60 + +tp[1] + 30;
      var endH = pad(Math.floor(totalMin/60)%24), endM = pad(totalMin%60);
      var endDay = day, endMo = mo, endY = y;
      if (totalMin >= 1440){
        var nextD = new Date(y, +mo-1, +day+1);
        endY = nextD.getFullYear(); endMo = pad(nextD.getMonth()+1); endDay = pad(nextD.getDate());
      }
      dates = dtStart + "/" + (endY + endMo + endDay + "T" + endH + endM + "00");
    } else {
      var dateStr = y + mo + day;
      dates = dateStr + "/" + dateStr;
    }
    var url = "https://calendar.google.com/calendar/render?action=TEMPLATE"
      + "&text=" + encodeURIComponent(taskText)
      + "&dates=" + encodeURIComponent(dates)
      + "&ctz="   + encodeURIComponent(ctz);
    window.open(url, "_blank");
    showToast("Abriendo Google Calendar…");
  }

  /* ===================== Evidencia (modal) ===================== */
  function compressImage(file, callback){
    var reader = new FileReader();
    reader.onload = function(e){
      var img = new Image();
      img.onload = function(){
        var maxSize = 800, w = img.width, h = img.height;
        if (w > maxSize || h > maxSize){
          if (w > h){ h = Math.round(h * maxSize / w); w = maxSize; }
          else { w = Math.round(w * maxSize / h); h = maxSize; }
        }
        var canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        callback(canvas.toDataURL("image/webp", 0.7));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

    document.getElementById("evidenceNote").value = "";
    document.getElementById("evidencePreview").innerHTML =
      '<p style="font-size:11px;color:var(--text-faint);">Cargando evidencia…</p>';

    /* Abrir el modal primero para que el usuario vea el loader */
    document.getElementById("evidenceModal").classList.add("open");

    /* Cargar datos existentes de IDB */
    dbGet(key).then(function(raw){
      var ev = null;
      if (raw){ try { ev = JSON.parse(raw); } catch(e){} }
      var preview = document.getElementById("evidencePreview");

      if (ev && ev.note){
        document.getElementById("evidenceNote").value = ev.note;
      }
      setTimeout(function(){ document.getElementById("evidenceNote").focus(); }, 100);
    }).catch(function(){
      document.getElementById("evidencePreview").innerHTML = "";
    });
  }

  function closeEvidenceModal(){
    document.getElementById("evidenceModal").classList.remove("open");
    pendingEvidence   = null;
    isEditingEvidence = false;
    editingPrevImage  = null;
  }

  function onEvidenceFileChange(){
    var file = this.files && this.files[0];
    if (!file) return;
    var preview = document.getElementById("evidencePreview");
    preview.innerHTML = "<p style='font-size:11px;color:var(--text-faint);'>Comprimiendo imagen…</p>";
    document.getElementById("evidenceFileLabel").childNodes[0].textContent = "✅ " + file.name.slice(0,30);
    /* Mostrar preview */
    compressImage(file, function(dataUrl){
      preview.innerHTML = '<img src="' + dataUrl + '" alt="Preview" /><p class="preview-note">✔ Imagen lista (comprimida WebP)</p>';
      /* Guardar dataUrl en el input como atributo para usarlo al guardar */
      document.getElementById("evidenceFile").setAttribute("data-compressed", dataUrl);
    });
  }

  function saveEvidence(){
    if (!pendingEvidence) return;
    var note       = document.getElementById("evidenceNote").value.trim();
    var compressed = document.getElementById("evidenceFile").getAttribute("data-compressed") || null;

    /* En modo edición: si no hay nueva imagen, conservar la anterior */
    var imageToSave = compressed || (isEditingEvidence ? editingPrevImage : null);

    if (!note && !imageToSave){
      showToast("Escribe una nota o adjunta una foto.");
      return;
    }

    var key      = pendingEvidence.ds + "_" + pendingEvidence.id;
    var ds       = pendingEvidence.ds;
    var id       = pendingEvidence.id;
    var editing  = isEditingEvidence;
    var evidence = JSON.stringify({
      note:    note || null,
      image:   imageToSave || null,
      savedAt: new Date().toISOString()
    });

    dbSet(key, evidence).catch(function(){}).then(function(){
      if (editing){
        /* Solo actualiza IDB — no cambia el estado de log ni re-marca */
        closeEvidenceModal();
        autoSyncToDrive();
        showToast("✏️ Evidencia actualizada.");
        renderActiveTab();
      } else {
        markDone(ds, id); /* markDone ya llama persist() → scheduleAutoSync() */
        closeEvidenceModal();
        showToast(ds === "project" ? "¡Proyecto completado y evidencia guardada!" : "¡Tarea cumplida y evidencia guardada!");
      }
    });
  }

  function openViewEvidenceModal(ds, id){
    var key = ds + "_" + id;
    var content = document.getElementById("viewEvidenceContent");
    content.innerHTML = "<p style='color:var(--text-faint);font-size:13px;'>Cargando evidencia…</p>";
    document.getElementById("viewEvidenceModal").classList.add("open");

    dbGet(key).then(function(raw){
      if (!raw){
        content.innerHTML = '<div class="ev-empty">No hay evidencia registrada para esta tarea.<br><small>Es posible que fue marcada antes de activar esta función.</small></div>';
        return;
      }
      var ev;
      try { ev = JSON.parse(raw); } catch(e){ ev = null; }
      if (!ev){ content.innerHTML = '<div class="ev-empty">No se pudo leer la evidencia.</div>'; return; }
      var html = "";
      if (ev.image) html += '<img src="' + escapeHtml(ev.image) + '" alt="Evidencia fotográfica" />';
      if (ev.note)  html += '<div class="ev-note">' + escapeHtml(ev.note) + '</div>';
      if (ev.savedAt){
        var d = new Date(ev.savedAt);
        html += '<div class="ev-meta">Guardado el ' + d.toLocaleDateString("es-BO") + ' a las ' + d.toLocaleTimeString("es-BO", {hour:"2-digit",minute:"2-digit"}) + '</div>';
      }
      if (!html) html = '<div class="ev-empty">La evidencia guardada está vacía.</div>';
      content.innerHTML = html;
    }).catch(function(){
      content.innerHTML = '<div class="ev-empty">Error al leer la evidencia.</div>';
    });
  }

  function closeViewEvidenceModal(){
    document.getElementById("viewEvidenceModal").classList.remove("open");
  }

  document.getElementById("evidenceCancelBtn").addEventListener("click", closeEvidenceModal);
  document.getElementById("viewEvidenceCloseBtn").addEventListener("click", closeViewEvidenceModal);

  /* ===================== Render: cabecera ===================== */
  function renderVoyageLine(){

  /* ===================== Render: tarea (componente) ===================== */
  function renderTaskItem(t, ds, opts){
    opts = opts || {};
    var status   = getStatus(ds, t.id);
    var isFuture = ds > todayStr();
    var btnClass = "task-stamp-btn" + (status === "done" ? " is-done" : "") + (status === "missed" ? " is-missed" : "");
    var icon     = status === "done" ? ICON_CHECK : (status === "missed" ? ICON_X : "");
    var disabled = isFuture ? "disabled" : "";

    /* Badge por tipo */
    var badgeHtml = "";
    if (t.type === "habit")   badgeHtml = '<span class="badge">hábito</span>';
    if (t.type === "routine") badgeHtml = '<span class="badge badge-routine">rutina</span>';

    /* Ojo y Lápiz de evidencia (solo si done) */
    var eyeBtn = status === "done"
      ? '<button class="task-eye-btn" data-action="view-evidence" data-date="' + ds + '" data-id="' + t.id + '" title="Ver evidencia">' + ICON_EYE + '</button>' +
        '<button class="task-pencil-btn" data-action="edit-evidence" data-date="' + ds + '" data-id="' + t.id + '" title="Editar evidencia">' + ICON_PENCIL + '</button>'
      : "";

    /* Botón de borrar (solo oneoff) */
    var del = (t.type === "oneoff" && opts.allowDelete !== false)
      ? '<button class="task-delete-btn" data-action="delete-task" data-id="' + t.id + '" aria-label="Eliminar tarea">&times;</button>'
      : "";

    /* Recordatorio */
    var rkey = reminderKey(ds, t.id);
    var existingReminder = getReminder(ds, t.id);
    var bellClass = "task-bell-btn" + (existingReminder ? " has-reminder" : "");
    var bellBtn = '<button class="' + bellClass + '" data-action="toggle-reminder-panel" data-rkey="' + rkey +
                  '" data-date="' + ds + '" data-id="' + t.id + '" title="' +
                  (existingReminder ? "Recordatorio: " + existingReminder : "Agregar recordatorio") + '">' + ICON_BELL + '</button>';

    var mainRow = (
      '<div class="task-main-row">' +
        '<button class="' + btnClass + '" ' + disabled +
          ' data-action="toggle-task" data-date="' + ds + '" data-id="' + t.id +
          '" aria-pressed="' + (status === "done") +
          '" title="' + (isFuture ? "Aún no ha llegado este día" : "") + '">' + icon + '</button>' +
        '<span class="task-text' + (status === "done" ? " is-done" : "") + '">' + escapeHtml(t.text) +
          (t.routineTime ? ' <small style="font-size:11px;color:var(--brass-300);font-family:var(--font-mono);">(' + escapeHtml(t.routineTime) + ')</small>' : '') +
        '</span>' +
        badgeHtml +
        eyeBtn +
        bellBtn +
        del +
      '</div>'
    );

    var panelOpen = (openReminderPanel === rkey);
    var reminderBadge = (existingReminder && !panelOpen)
      ? '<div class="task-reminder-row"><span class="reminder-time-badge">' + ICON_BELL + existingReminder + '</span>' +
          '<button class="btn-remind-export" data-action="export-ics" data-date="' + ds + '" data-id="' + t.id + '">' +
            ICON_CALENDAR_SM + 'Agendar en Google Calendar' +
          '</button></div>'
      : "";

    var panelHtml = "";
    if (panelOpen){
      var notifStatus = ("Notification" in window) ? Notification.permission : "unsupported";
      var deniedMsg = notifStatus === "denied"
        ? '<div class="notif-denied-msg">⚠ Notificaciones bloqueadas en el navegador — igual podés exportar al calendario.</div>' : "";
      panelHtml = (
        '<div class="reminder-inline-form">' +
          '<label>⏰ Hora:</label>' +
          '<input type="time" id="rtime-' + rkey.replace(/[|]/g,"_") + '" value="' + escapeHtml(existingReminder || "") + '" />' +
          '<button class="btn-remind-save" data-action="save-reminder" data-date="' + ds + '" data-id="' + t.id + '">Guardar</button>' +
          (existingReminder ? '<button class="btn-remind-clear" data-action="clear-reminder" data-date="' + ds + '" data-id="' + t.id + '">Quitar</button>' : '') +
          (existingReminder ? '<button class="btn-remind-export" data-action="export-ics" data-date="' + ds + '" data-id="' + t.id + '">' + ICON_CALENDAR_SM + 'Agendar en Google Calendar</button>' : '') +
          deniedMsg +
        '</div>'
      );
    }

    var hasExtra = reminderBadge || panelHtml;
    return (
      '<div class="task-item' + (hasExtra ? " has-reminder" : "") + '">' +
        mainRow + reminderBadge + panelHtml +
      '</div>'
    );
  }

  function renderTaskList(ds, opts){
    var tasks = getTasksForDate(ds);

    return '<div class="task-list">' + tasks.map(function(t){ return renderTaskItem(t, ds, opts); }).join("") + '</div>';

  /* ===================== Render: pestaña Hoy ===================== */

    var today = todayStr();

  /* ===================== Render: pestaña Calendario ===================== */
  function buildMonthGrid(viewDate){
    var year = viewDate.getFullYear(), month = viewDate.getMonth();
    var daysInMonth = new Date(year, month+1, 0).getDate();
    var firstDow = new Date(year, month, 1).getDay();
    var offset = (firstDow + 6) % 7;
    var cells = [];
    for (var i=0;i<offset;i++) cells.push(null);
    for (var d=1; d<=daysInMonth; d++) cells.push(dateToStr(new Date(year, month, d)));
    return cells;
  }
  /* Genera lista de años disponibles: desde firstUseDate hasta 2 años en el futuro */
  function getAvailableYears(){
    var startYear = parseInt((state.firstUseDate || todayStr()).substring(0, 4), 10);
    var endYear   = new Date().getFullYear() + 2;
    var years = [];
    for (var y = startYear; y <= endYear; y++) years.push(y);
    return years;
  }

  function renderCalendario(){
    /* Sincronizar año histórico con calendarViewDate */
    var currentYear = new Date().getFullYear();
    if (calendarHistoricalYear !== null && calendarHistoricalYear !== calendarViewDate.getFullYear()){
      calendarViewDate = new Date(calendarHistoricalYear, calendarViewDate.getMonth(), 1);
    }

    var cells = buildMonthGrid(calendarViewDate);
    var monthLabel = MONTHS[calendarViewDate.getMonth()] + " de " + calendarViewDate.getFullYear();
    var today = todayStr();
    var viewYear = calendarViewDate.getFullYear();

    var gridHtml = cells.map(function(ds){
      if (!ds) return '<button class="cal-day empty" disabled></button>';
      var lvl = heatLevel(ds);
      var classes = "cal-day level-" + lvl;
      if (ds === today) classes += " is-today";
      if (ds === selectedCalendarDate) classes += " selected";
      var dayNum = parseInt(ds.split("-")[2], 10);
      return '<button class="' + classes + '" data-action="cal-select" data-date="' + ds + '">' + dayNum + '</button>';
    }).join("");

    var sel = selectedCalendarDate;
    /* Si la fecha seleccionada no pertenece al año/mes visible, usar el primer día del mes */
    if (!sel || sel.substring(0,7) !== (viewYear + "-" + pad(calendarViewDate.getMonth()+1))){
      sel = viewYear + "-" + pad(calendarViewDate.getMonth()+1) + "-01";
    }
    var isFuture = sel > today;
    var detailHtml =
      '<div class="day-detail">' +
        '<h3>' + capitalize(formatDateLong(sel)) + '</h3>' +
        (isFuture ? '<div class="future-note">Puedes programar tareas para este día. Podrás marcarlas como cumplidas cuando llegue.</div>' : '') +
        addFormHtml(sel, true) +
        renderTaskList(sel) +
      '</div>';

    /* Selector de año */
    var availYears = getAvailableYears();
    var yearOptions = availYears.map(function(y){
      var sel2 = (y === viewYear) ? ' selected' : '';
      return '<option value="' + y + '"' + sel2 + '>' + y + (y === currentYear ? ' (actual)' : '') + '</option>';
    }).join("");
    var yearSelectorHtml =
      '<div class="cal-year-selector">' +
        '<label for="calYearSelect">📅 Año:</label>' +
        '<select id="calYearSelect" class="cal-year-select" data-action="cal-year-change">' +
          yearOptions +
        '</select>' +
      '</div>';

    return (
      '<section class="block">' +
        yearSelectorHtml +
        '<div class="cal-nav">' +
          '<button data-action="cal-prev" aria-label="Mes anterior">&larr;</button>' +
          '<h2>' + monthLabel + '</h2>' +
          '<button data-action="cal-next" aria-label="Mes siguiente">&rarr;</button>' +
        '</div>' +
        '<div class="cal-weekdays">' + WD_MON_FIRST.map(function(w){ return "<span>"+w+"</span>"; }).join("") + '</div>' +
        '<div class="cal-grid">' + gridHtml + '</div>' +
        detailHtml +
      '</section>'
    );
  }

  /* ===================== Render: pestaña Hábitos ===================== */
  function renderHabitos(){
    /* --- Hábitos diarios --- */
    var active = state.habits.filter(function(h){ return !h.archivedAt; });
    var listHtml;
    if (active.length === 0){
      listHtml = '<div class="empty-state"><strong>Aún no tienes hábitos en seguimiento.</strong>Agrega uno para empezar tu racha.</div>';
    } else {
      listHtml = active.map(function(h){
        var streak = habitStreak(h);
        var rate   = habitCompletionRate(h);
        return (
          '<div class="habit-row">' +
            '<div class="hr-top">' +
              '<div class="hr-text">' + escapeHtml(h.text) + '</div>' +
              '<button class="hr-archive" data-action="archive-habit" data-id="' + h.id + '">Archivar</button>' +
            '</div>' +
            '<div class="hr-stats">' +
              '<span>Racha: <b>' + streak + '</b> ' + (streak===1?"día":"días") + '</span>' +
              '<span>Cumplimiento: <b>' + (rate===null? "—" : rate+"%") + '</b></span>' +
              '<span>Desde: <b>' + formatDateShort(h.createdAt) + '</b></span>' +
            '</div>' +

        '<div style="display:flex;gap:8px;flex-wrap:wrap;width:100%;">' +
          '<input type="text" name="routineText" placeholder="Nombre de la rutina" maxlength="100" required style="flex:1;min-width:160px;" />' +
          '<input type="time" name="routineTime" title="Hora opcional" style="width:120px;" />' +
        '</div>' +
        '<div style="width:100%;">' +
          '<div style="font-size:11.5px;color:var(--text-muted);margin-bottom:6px;">Días de la semana:</div>' +
          '<div class="day-picker">' +
            DAY_UI.map(function(d){
              return (
                '<label class="day-btn-label">' +
                  '<input type="checkbox" name="days" value="' + d.day + '" />' +
                  '<span class="day-btn-chip">' + d.label + '</span>' +
                '</label>'
              );
            }).join("") +
          '</div>' +
        '</div>' +
        '<button type="submit" class="primary" style="align-self:flex-start;">Agregar rutina</button>' +
      '</form>'
    );

    var routineListHtml;
    if (state.routines.length === 0){
      routineListHtml = '<div class="empty-state"><strong>Sin rutinas configuradas.</strong>Crea una para que aparezca automáticamente en los días que elijas.</div>';
    } else {
      routineListHtml = state.routines.map(function(r){
        var dayChips = r.days.map(function(d){
          var lbl = DAY_UI.find(function(x){ return x.day === d; });
          return '<span class="routine-day-chip">' + (lbl ? lbl.label : d) + '</span>';

        var timeChip = r.time ? '<span class="routine-time-chip">⏱ ' + escapeHtml(r.time) + '</span>' : "";

    return (

          '<button type="submit" class="primary">Agregar</button>' +

      '<section class="block">' +
        '<div class="block-title">En seguimiento</div>' +

        routineFormHtml +
        routineListHtml +
      '</section>'

  /* ===================== Render: pestaña Proyectos ===================== */
  function renderProyectos(){
    var active    = state.projects.filter(function(p){ return p.status === "active"; });
    var completed = state.projects.filter(function(p){ return p.status === "completed"; });

    /* Ordenar activos por fecha límite */
    active.sort(function(a,b){ return a.deadline < b.deadline ? -1 : a.deadline > b.deadline ? 1 : 0; });

    function projectCard(p){
      var isCompleted = p.status === "completed";
      var deadlineBadge = "";
      
      /* 1. Lógica para la etiqueta de la fecha (se mantiene igual) */
      if (!isCompleted){
        var diff = daysUntil(p.deadline);
        var cls  = diff < 0 ? "urgent" : diff <= 7 ? "soon" : "ok";
        var txt  = diff < 0 ? "Venció hace " + Math.abs(diff) + "d"
                 : diff === 0 ? "¡Vence hoy!"
                 : "Vence en " + diff + " día" + (diff===1?"":"s");
        deadlineBadge = '<span class="project-deadline-badge ' + cls + '">📅 ' + txt + ' · ' + formatDateShort(p.deadline) + '</span>';
      } else {
        deadlineBadge = '<span class="project-deadline-badge done-badge">✔ Completado el ' + (p.completedAt ? formatDateShort(p.completedAt) : "—") + '</span>';
      }

      /* 2. Botón del ojo y lápiz condicionales */
      var eyeBtn = isCompleted
        ? '<button class="task-eye-btn" data-action="view-evidence" data-date="project" data-id="' + p.id + '" title="Ver evidencia" style="display:inline-block; margin-left:8px; vertical-align:middle;">' + ICON_EYE + '</button>' +
          '<button class="task-pencil-btn" data-action="edit-evidence" data-date="project" data-id="' + p.id + '" title="Editar evidencia" style="display:inline-block; margin-left:4px; vertical-align:middle;">' + ICON_PENCIL + '</button>'
        : "";

      var actions = isCompleted
        ? '<button class="btn-delete-project" data-action="delete-project" data-id="' + p.id + '">Eliminar</button>'
        : (
            '<button class="btn-complete-project" data-action="complete-project" data-id="' + p.id + '">✔ Completar</button>' +
            '<button class="btn-delete-project" data-action="delete-project" data-id="' + p.id + '">Eliminar</button>'
          );
          
      /* 3. Renderizamos el HTML final, inyectando el eyeBtn al lado del título */
      return (
        '<div class="project-item' + (isCompleted ? " is-completed" : "") + '">' +
          '<div class="project-header">' +
            '<div class="project-name">' + escapeHtml(p.text) + eyeBtn + '</div>' +
            '<div class="project-actions">' + actions + '</div>' +
          '</div>' +
          '<div class="project-meta">' +
            deadlineBadge +
            '<span style="font-size:11px;color:var(--text-faint);">Creado: ' + formatDateShort(p.createdAt) + '</span>' +
          '</div>' +
        '</div>'
      );
    }

    var activeHtml = active.length
      ? active.map(projectCard).join("")
      : '<div class="empty-state"><strong>No hay proyectos activos.</strong>Crea uno para empezar a seguirlo.</div>';

    var completedHtml = completed.length
      ? '<div class="section-divider">Proyectos completados (' + completed.length + ')</div>' + completed.map(projectCard).join("")
      : "";

    return (
      '<section class="block">' +
        '<div class="block-title">Nuevo proyecto</div>' +
        '<form class="add-form" style="flex-direction:column;align-items:flex-start;gap:8px;" data-action="add-project">' +
          '<div style="display:flex;gap:8px;flex-wrap:wrap;width:100%;">' +
            '<input type="text" name="projectText" placeholder="Nombre del proyecto u objetivo" maxlength="150" required style="flex:1;min-width:180px;" />' +
            '<input type="date" name="projectDeadline" title="Fecha límite" required style="width:150px;" />' +
          '</div>' +
          '<button type="submit" class="primary" style="align-self:flex-start;">Agregar proyecto</button>' +
        '</form>' +
      '</section>' +
      '<section class="block">' +
        '<div class="block-title">Proyectos activos (' + active.length + ')</div>' +
        activeHtml +
        completedHtml +
      '</section>'
    );
  }

  /* ===================== Render: pestaña Estadísticas ===================== */

  /* ===================== Backup: leer TODO de IndexedDB con cursor ===================== */
  function dbReadAllWithCursor(){
    return new Promise(function(resolve, reject){
      if (!db){ resolve({}); return; }
      try {
        var tx    = db.transaction("evidence", "readonly");
        var store = tx.objectStore("evidence");
        var req   = store.openCursor();
        var all   = {};
        req.onsuccess = function(e){
          var cursor = e.target.result;
          if (cursor){
            all[cursor.key] = cursor.value;
            cursor.continue();
          } else {
            resolve(all);
          }
        };
        req.onerror = function(){ reject(req.error); };
      } catch(err){ reject(err); }
    });
  }

  /* ===================== Backup: limpiar IndexedDB completamente ===================== */
  function dbClearAll(){
    return new Promise(function(resolve, reject){
      if (!db){ resolve(); return; }
      try {
        var tx    = db.transaction("evidence", "readwrite");
        var req   = tx.objectStore("evidence").clear();
        tx.oncomplete = function(){ resolve(); };
        tx.onerror    = function(){ reject(tx.error); };
      } catch(err){ reject(err); }
    });
  }

  /* ===================== Backup: reinyectar evidencias en IndexedDB ===================== */
  function dbBulkWrite(entriesObj){
    return new Promise(function(resolve, reject){
      if (!db || !entriesObj || Object.keys(entriesObj).length === 0){ resolve(); return; }
      try {
        var tx    = db.transaction("evidence", "readwrite");
        var store = tx.objectStore("evidence");
        Object.keys(entriesObj).forEach(function(key){
          store.put(entriesObj[key], key);
        });
        tx.oncomplete = function(){ resolve(); };
        tx.onerror    = function(){ reject(tx.error); };
      } catch(err){ reject(err); }
    });
  }

  /* ===================== Backup: extraer año de clave "YYYY-MM-DD_..." o "project_..." ===================== */
  function extractYearFromKey(key){
    if (!key) return "sin-fecha";
    /* Formato normal: "2025-06-15_habitoId" */
    var m = key.match(/^(\d{4})-\d{2}-\d{2}/);
    if (m) return m[1];
    /* Proyectos: "project_id" */
    if (key.indexOf("project_") === 0) return "projects";
    return "sin-fecha";
  }

  /* ===================== exportMasterBackup: Exportación Única Segmentada por Año ===================== */
  async function exportMasterBackup(){
    var btn = document.getElementById("btnBackupExport");
    var statusEl = document.getElementById("backupStatus");
    if (btn) btn.disabled = true;
    if (statusEl){ statusEl.className = "backup-status working"; statusEl.textContent = "⏳ Preparando respaldo completo…"; }

    try {
      if (statusEl) statusEl.textContent = "⏳ Leyendo datos y evidencias…";
      var backup = await buildMasterBackupJSON();

      /* Serializar y descargar */
      if (statusEl) statusEl.textContent = "⏳ Generando archivo JSON…";
      var json     = JSON.stringify(backup, null, 2);
      var blob     = new Blob([json], { type: "application/json" });
      var url      = URL.createObjectURL(blob);
      var a        = document.createElement("a");
      a.href       = url;
      var dateTag  = new Date().toISOString().slice(0,10).replace(/-/g,"");
      a.download   = "bitacora_respaldo_total_" + dateTag + ".json";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      var totalEv = backup._meta.totalEvidenceKeys || 0;
      var totalYears = Object.keys(backup.evidenceByYear).length;
      if (statusEl){
        statusEl.className = "backup-status success";
        statusEl.textContent = "✔ Respaldo exportado · " + totalEv + " evidencias · " + totalYears + " año(s)";
      }
      showToast("✅ Respaldo descargado correctamente.");
    } catch(err){
      console.error("Backup export error:", err);
      if (statusEl){
        statusEl.className = "backup-status error";
        statusEl.textContent = "✖ Error: " + (err.message || err);
      }
      showToast("Error al exportar el respaldo.");
    } finally {
      if (btn) btn.disabled = false;
    }
  }

  /* ===================== importMasterBackup: Importación y Desempaquetado ===================== */
  async function importMasterBackup(file){
    var btn      = document.getElementById("btnBackupImport");
    var statusEl = document.getElementById("backupStatus");
    if (!file) return;
    if (btn) btn.disabled = true;
    if (statusEl){ statusEl.className = "backup-status working"; statusEl.textContent = "⏳ Leyendo archivo de respaldo…"; }

    try {
      /* 1. Leer el archivo JSON */
      var text = await new Promise(function(resolve, reject){
        var reader = new FileReader();
        reader.onload  = function(e){ resolve(e.target.result); };
        reader.onerror = function(){ reject(new Error("No se pudo leer el archivo.")); };
        reader.readAsText(file);
      });

      var backup;
      try { backup = JSON.parse(text); } catch(e){ throw new Error("El archivo no es un JSON válido."); }

      /* Validación mínima */
      if (!backup._meta || !backup.state){
        throw new Error("El archivo no parece ser un respaldo de Bitácora válido.");
      }

      /* Confirmar con el usuario */
      var ok = window.confirm(
        "⚠ IMPORTAR RESPALDO\n\n" +
        "Esto REEMPLAZARÁ toda tu bitácora actual con los datos del archivo:\n" +
        "· Exportado: " + (backup._meta.exportedAt || "—") + "\n" +
        "· Evidencias: " + (backup._meta.totalEvidenceKeys || 0) + " registros\n\n" +
        "¿Deseas continuar? Esta acción no se puede deshacer."
      );
      if (!ok){
        if (statusEl){ statusEl.className = "backup-status"; statusEl.style.display = "none"; }
        if (btn) btn.disabled = false;
        return;
      }

      /* 2. Limpiar localStorage */
      if (statusEl) statusEl.textContent = "⏳ Limpiando datos actuales…";
      try { window.localStorage.removeItem(STORAGE_KEY); } catch(e){}
      if (typeof window.storage === "object" && window.storage && window.storage.delete){
        try { await window.storage.delete(STORAGE_KEY, false); } catch(e){}
      }

      /* 3. Limpiar IndexedDB */
      if (statusEl) statusEl.textContent = "⏳ Limpiando base de datos de evidencias…";
      await dbClearAll();

      /* 4. Reescribir state en localStorage */
      if (statusEl) statusEl.textContent = "⏳ Restaurando configuración y historial…";
      var restoredState = backup.state;
      /* Normalizar campos por si el backup es de versión anterior */
      restoredState.habits       = restoredState.habits       || [];
      restoredState.oneoff       = restoredState.oneoff       || [];
      restoredState.log          = restoredState.log          || {};
      restoredState.firstUseDate = restoredState.firstUseDate || todayStr();
      restoredState.reminders    = restoredState.reminders    || {};
      restoredState.projects     = restoredState.projects     || [];
      restoredState.routines     = restoredState.routines     || [];

      await storageSet(STORAGE_KEY, JSON.stringify(restoredState));

      /* 5. Reinyectar evidencias de todos los bloques de año */
      if (statusEl) statusEl.textContent = "⏳ Restaurando evidencias…";
      var evidenceByYear = backup.evidenceByYear || {};
      var years = Object.keys(evidenceByYear);
      var totalRestored = 0;
      for (var i = 0; i < years.length; i++){
        var block = evidenceByYear[years[i]];
        await dbBulkWrite(block);
        totalRestored += Object.keys(block).length;
      }

      /* 6. Mensaje de éxito y recarga */
      if (statusEl){
        statusEl.className = "backup-status success";
        statusEl.textContent = "✔ Restaurado: " + totalRestored + " evidencias en " + years.length + " año(s). Recargando…";
      }
      showToast("✅ Bitácora restaurada. Recargando…");
      setTimeout(function(){ window.location.reload(); }, 1500);

    } catch(err){
      console.error("Backup import error:", err);
      if (statusEl){
        statusEl.className = "backup-status error";
        statusEl.textContent = "✖ Error: " + (err.message || err);
      }
      showToast("Error al importar el respaldo.");
      if (btn) btn.disabled = false;
    }
  }

  /* ---- Persistencia de sesión en localStorage ---- */
  function saveDriveSession(){

  /* ---- Renovación silenciosa del token ---- */
  /* Intenta obtener un nuevo access_token sin abrir ventana de login.
     Si el usuario aún tiene sesión activa en Chrome/Google, funciona de forma invisible.
     Si la sesión de Google expiró, simplemente marca como desconectado. */
  function silentTokenRenew(){
    if (!driveTokenClient) return;
    /* Si el token aún tiene más de 5 min de vida, no hace falta renovar */
    if (driveAccessToken && Date.now() < driveTokenExpiry - 5 * 60 * 1000) return;
    driveIsSilentRenew = true;
    try {
      /* ¡Aquí está la magia! Le pasamos el correo a Google para que renueve sin preguntar */
      driveTokenClient.requestAccessToken({ prompt: "none", login_hint: driveUserEmail });
    } catch(e){
      driveIsSilentRenew = false;
    }
  }

  /* ---- Timer de renovación automática cada 50 minutos ---- */
  function startTokenRefreshTimer(){
    stopTokenRefreshTimer();
    driveRefreshTimer = setInterval(function(){
      silentTokenRenew();
    }, 50 * 60 * 1000); /* 50 minutos → el token dura 60, renovamos con margen */
  }

  function stopTokenRefreshTimer(){
    if (driveRefreshTimer){
      clearInterval(driveRefreshTimer);
      driveRefreshTimer = null;
    }
  }
