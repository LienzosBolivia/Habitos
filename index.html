<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bitácora — Hábitos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink-900:#0A1B27;
    --ink-850:#0F2333;
    --ink-800:#15324480;
    --ink-800-solid:#163141;
    --ink-700:#1E4257;
    --ink-650:#274d63;
    --brass-600:#A87B3C;
    --brass-500:#C9974A;
    --brass-300:#E3BD7C;
    --brass-100:#F3DFB8;
    --parchment:#F1E7CF;
    --parchment-dim:#C9BB98;
    --done:#5FA177;
    --done-dim:#23362C;
    --missed:#C1573D;
    --missed-dim:#3A2620;
    --text-light:#EDE6D6;
    --text-muted:#8FA6B2;
    --text-faint:#5E7886;
    --radius-sm:6px;
    --radius-md:10px;
    --radius-lg:18px;
    --font-display:'Fraunces', serif;
    --font-body:'IBM Plex Sans', sans-serif;
    --font-mono:'IBM Plex Mono', monospace;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--ink-900);
    background-image:
      radial-gradient(circle at 15% 0%, rgba(201,151,74,0.07), transparent 40%),
      radial-gradient(circle at 85% 100%, rgba(95,161,119,0.06), transparent 45%);
    color:var(--text-light);
    font-family:var(--font-body);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{font-family:var(--font-display); margin:0;}
  button{font-family:inherit;}
  ::selection{background:var(--brass-500); color:var(--ink-900);}

  button:focus-visible, input:focus-visible, textarea:focus-visible, [tabindex]:focus-visible{
    outline:2px solid var(--brass-300);
    outline-offset:2px;
  }

  /* ---------- Masthead ---------- */
  .masthead{
    padding:30px 20px 20px;
    text-align:center;
    border-bottom:1px solid var(--ink-700);
    background:linear-gradient(180deg, var(--ink-850), var(--ink-900));
  }
  .masthead h1{
    font-weight:900;
    font-size:30px;
    letter-spacing:0.14em;
    color:var(--brass-300);
    text-transform:uppercase;
  }
  .masthead .subtitle{
    margin-top:4px;
    font-size:11px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--text-muted);
  }
  .masthead .voyage-line{
    margin-top:14px;
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--text-faint);
    letter-spacing:0.04em;
  }
  .masthead .voyage-line strong{color:var(--brass-300); font-weight:600;}

  /* ---------- Layout ---------- */
  main{
    max-width:680px;
    margin:0 auto;
    width:100%;
    padding:20px 16px 110px;
  }
  .tab-panel{display:none;}
  .tab-panel.active{display:block; animation:fadeIn .25s ease;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);}}

  section.block{margin-bottom:26px;}
  .block-title{
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:0.1em;
    color:var(--text-muted);
    margin-bottom:10px;
    font-weight:600;
  }

  /* ---------- Progress / Hero ---------- */
  .progress-hero{
    background:var(--ink-800-solid);
    border:1px solid var(--ink-700);
    border-radius:var(--radius-lg);
    padding:20px;
    margin-bottom:20px;
    position:relative;
    overflow:hidden;
  }
  .progress-hero .ph-row{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:12px;}
  .progress-hero .ph-count{font-family:var(--font-mono); font-size:26px; color:var(--brass-300); font-weight:600;}
  .progress-hero .ph-count span{font-size:14px; color:var(--text-muted); font-weight:400;}
  .progress-hero .ph-pct{font-family:var(--font-mono); font-size:14px; color:var(--text-muted);}
  .progress-track{height:14px; background:var(--ink-700); border-radius:8px; overflow:hidden;}
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg, var(--brass-600), var(--brass-300));
    border-radius:8px;
    transition:width .5s cubic-bezier(.2,.8,.2,1);
  }

  .stamp-wrap{display:flex; justify-content:center; margin:18px 0 4px;}
  .stamp{
    width:108px; height:108px;
    border-radius:50%;
    border:3px double var(--brass-500);
    display:flex; align-items:center; justify-content:center;
    flex-direction:column;
    transform:rotate(-9deg) scale(1);
    color:var(--brass-300);
    text-align:center;
    box-shadow:0 0 0 4px rgba(201,151,74,0.08);
  }
  .stamp .stamp-main{font-family:var(--font-mono); font-weight:700; font-size:13px; letter-spacing:0.1em;}
  .stamp .stamp-sub{font-size:9px; letter-spacing:0.08em; color:var(--parchment-dim); margin-top:2px; text-transform:uppercase;}
  @media (prefers-reduced-motion: no-preference){
    .stamp-enter{animation:stampThud .42s cubic-bezier(.2,1.4,.4,1);}
  }
  @keyframes stampThud{
    0%{transform:rotate(-9deg) scale(1.9); opacity:0;}
    60%{transform:rotate(-9deg) scale(0.94); opacity:1;}
    100%{transform:rotate(-9deg) scale(1); opacity:1;}
  }

  /* ---------- Forms ---------- */
  .add-form{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; align-items:center;}
  .add-form input[type="text"],
  .add-form input[type="date"]{
    flex:1; min-width:140px;
    background:var(--ink-800-solid);
    border:1px solid var(--ink-700);
    color:var(--text-light);
    padding:11px 13px;
    border-radius:var(--radius-sm);
    font-size:14px;
    color-scheme:dark;
  }
  .add-form input[type="text"]::placeholder{color:var(--text-faint);}
  .repeat-toggle{
    display:flex; align-items:center; gap:6px;
    font-size:12px; color:var(--text-muted);
    white-space:nowrap;
    cursor:pointer;
  }
  .repeat-toggle input{accent-color:var(--brass-500); width:15px; height:15px;}
  button.primary{
    background:var(--brass-500);
    color:var(--ink-900);
    font-weight:600;
    border:none;
    padding:11px 18px;
    border-radius:var(--radius-sm);
    cursor:pointer;
    font-size:14px;
    transition:background .15s ease;
  }
  button.primary:hover{background:var(--brass-300);}
  button.btn-secondary{
    background:transparent;
    color:var(--text-muted);
    border:1px solid var(--ink-650);
    padding:10px 16px;
    border-radius:var(--radius-sm);
    cursor:pointer;
    font-size:14px;
    transition:border-color .15s, color .15s;
  }
  button.btn-secondary:hover{border-color:var(--brass-500); color:var(--text-light);}

  /* ---------- Task items ---------- */
  .task-list{display:flex; flex-direction:column; gap:8px;}
  .task-item{
    display:flex; align-items:center; gap:12px;
    background:var(--ink-800-solid);
    border:1px solid var(--ink-700);
    border-radius:var(--radius-md);
    padding:11px 13px;
  }
  .task-stamp-btn{
    flex:0 0 30px; width:30px; height:30px;
    border-radius:50%;
    border:2px solid var(--text-faint);
    background:transparent;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    color:transparent;
    transition:transform .15s ease;
  }
  .task-stamp-btn:hover{transform:scale(1.07);}
  .task-stamp-btn svg{width:16px; height:16px;}
  .task-stamp-btn.is-done{background:var(--done); border-color:var(--done); color:var(--ink-900);}
  .task-stamp-btn.is-missed{background:var(--missed-dim); border-color:var(--missed);}
  .task-stamp-btn:disabled{opacity:.45; cursor:not-allowed;}
  .task-text{flex:1; font-size:14.5px; color:var(--text-light); line-height:1.4;}
  .task-text.is-done{color:var(--text-muted); text-decoration:line-through;}
  .badge{
    font-family:var(--font-mono);
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--brass-300);
    border:1px solid var(--ink-650);
    border-radius:4px;
    padding:2px 6px;
    white-space:nowrap;
  }
  .badge.badge-routine{color:var(--done); border-color:var(--done-dim);}
  .task-delete-btn{
    flex:0 0 auto;
    background:none; border:none;
    color:var(--text-faint);
    font-size:18px;
    line-height:1;
    cursor:pointer;
    padding:0 2px;
  }
  .task-delete-btn:hover{color:var(--missed);}

  /* Evidence eye button */
  .task-eye-btn{
    flex:0 0 auto;
    background:none; border:none;
    color:var(--done);
    cursor:pointer;
    padding:0 2px;
    display:flex; align-items:center;
    opacity:.8;
    transition:opacity .15s;
  }
  .task-eye-btn:hover{opacity:1;}
  .task-eye-btn svg{width:15px; height:15px;}

  .empty-state{
    text-align:center;
    padding:32px 16px;
    color:var(--text-muted);
    font-size:14px;
    border:1px dashed var(--ink-700);
    border-radius:var(--radius-md);
  }
  .empty-state strong{display:block; color:var(--text-light); margin-bottom:4px; font-size:15px;}

  /* ---------- Calendar ---------- */
  .cal-nav{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
  .cal-nav h2{font-size:17px; color:var(--brass-300); text-transform:capitalize;}
  .cal-nav button{
    background:var(--ink-800-solid);
    border:1px solid var(--ink-700);
    color:var(--text-light);
    width:32px; height:32px;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
  }
  .cal-nav button:hover{border-color:var(--brass-500);}
  .cal-weekdays{display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-bottom:6px;}
  .cal-weekdays span{text-align:center; font-size:10px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.05em;}
  .cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:4px;}
  .cal-day{
    aspect-ratio:1/1;
    border-radius:8px;
    border:1px solid var(--ink-700);
    background:var(--ink-800-solid);
    color:var(--text-muted);
    font-family:var(--font-mono);
    font-size:12px;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    position:relative;
  }
  .cal-day:hover{border-color:var(--brass-500);}
  .cal-day.empty{visibility:hidden; cursor:default;}
  .cal-day.is-today{border-color:var(--brass-300); font-weight:600;}
  .cal-day.selected{box-shadow:0 0 0 2px var(--brass-300) inset;}
  .cal-day.level-1{background:var(--missed-dim); color:var(--parchment-dim);}
  .cal-day.level-2{background:#3a2f17; color:var(--brass-100);}
  .cal-day.level-3{background:#5a4520; color:var(--brass-100);}
  .cal-day.level-4{background:var(--brass-500); color:var(--ink-900); font-weight:600;}

  .day-detail{
    margin-top:18px;
    padding-top:16px;
    border-top:1px solid var(--ink-700);
  }
  .day-detail h3{font-size:14px; color:var(--text-light); margin-bottom:10px; font-weight:600;}
  .future-note{font-size:12px; color:var(--text-faint); margin-bottom:10px;}

  /* ---------- Habitos ---------- */
  .habit-row{
    background:var(--ink-800-solid);
    border:1px solid var(--ink-700);
    border-radius:var(--radius-md);
    padding:13px 15px;
    margin-bottom:8px;
  }
  .habit-row .hr-top{display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .habit-row .hr-text{font-size:15px; color:var(--text-light); font-weight:500;}
  .habit-row .hr-archive{
    background:none; border:1px solid var(--ink-650);
    color:var(--text-muted); font-size:11px;
    padding:5px 10px; border-radius:6px; cursor:pointer; white-space:nowrap;
  }
  .habit-row .hr-archive:hover{border-color:var(--missed); color:var(--missed);}
  .habit-row .hr-stats{
    display:flex; gap:16px; margin-top:8px;
    font-family:var(--font-mono); font-size:11.5px; color:var(--text-muted);
  }
  .habit-row .hr-stats b{color:var(--brass-300); font-weight:600;}

  /* ---------- Rutinas Semanales ---------- */
  .day-picker{
    display:flex; gap:5px; flex-wrap:wrap;
    margin:8px 0 12px;
  }
  .day-btn-label{
    display:flex; flex-direction:column; align-items:center; cursor:pointer;
  }
  .day-btn-label input[type="checkbox"]{display:none;}
  .day-btn-chip{
    width:34px; height:34px;
    border-radius:50%;
    border:1px solid var(--ink-650);
    background:var(--ink-800-solid);
    color:var(--text-faint);
    font-family:var(--font-mono);
    font-size:11px; font-weight:600;
    display:flex; align-items:center; justify-content:center;
    transition:background .15s, border-color .15s, color .15s;
    user-select:none;
  }
  .day-btn-label input:checked + .day-btn-chip{
    background:var(--done-dim);
    border-color:var(--done);
    color:var(--done);
  }
  .day-btn-label:hover .day-btn-chip{border-color:var(--brass-500);}

  .routine-item{
    background:var(--ink-800-solid);
    border:1px solid var(--ink-700);
    border-radius:var(--radius-md);
    padding:12px 14px;
    margin-bottom:8px;
    display:flex; align-items:center; gap:10px;
  }
  .routine-item-body{flex:1; min-width:0;}
  .routine-item-text{font-size:14px; color:var(--text-light); font-weight:500;}
  .routine-item-meta{
    display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; align-items:center;
  }
  .routine-day-chip{
    font-family:var(--font-mono); font-size:10px;
    background:var(--done-dim); color:var(--done);
    border-radius:20px; padding:2px 8px;
  }
  .routine-time-chip{
    font-family:var(--font-mono); font-size:10px;
    color:var(--brass-300); background:rgba(168,123,60,0.12);
    border-radius:20px; padding:2px 8px;
  }
  .routine-delete-btn{
    background:none; border:none;
    color:var(--text-faint); font-size:18px; cursor:pointer; padding:0 2px;
  }
  .routine-delete-btn:hover{color:var(--missed);}
  .add-form input[type="time"]{
    background:var(--ink-800-solid);
    border:1px solid var(--ink-700);
    color:var(--text-light);
    padding:11px 10px;
    border-radius:var(--radius-sm);
    font-size:14px;
    font-family:var(--font-mono);
    color-scheme:dark;
  }

  /* ---------- Proyectos ---------- */
  .project-item{
    background:var(--ink-800-solid);
    border:1px solid var(--ink-700);
    border-radius:var(--radius-md);
    padding:14px 16px;
    margin-bottom:10px;
  }
  .project-item.is-completed{opacity:.6;}
  .project-header{display:flex; align-items:flex-start; justify-content:space-between; gap:10px;}
  .project-name{
    font-size:15px; font-weight:600; color:var(--text-light);
    font-family:var(--font-display);
    flex:1;
  }
  .project-item.is-completed .project-name{
    text-decoration:line-through; color:var(--text-muted);
  }
  .project-meta{
    display:flex; gap:12px; margin-top:8px; flex-wrap:wrap;
    font-family:var(--font-mono); font-size:11.5px; color:var(--text-muted);
    align-items:center;
  }
  .project-deadline-badge{
    display:inline-flex; align-items:center; gap:4px;
    font-family:var(--font-mono); font-size:11px;
    padding:3px 9px; border-radius:20px;
    border:1px solid var(--ink-650);
  }
  .project-deadline-badge.urgent{border-color:var(--missed); color:var(--missed);}
  .project-deadline-badge.soon{border-color:var(--brass-500); color:var(--brass-300);}
  .project-deadline-badge.ok{border-color:var(--done); color:var(--done);}
  .project-deadline-badge.done-badge{border-color:var(--ink-650); color:var(--text-faint);}
  .project-actions{display:flex; gap:6px; flex-shrink:0;}
  .btn-complete-project{
    background:none; border:1px solid var(--done);
    color:var(--done); font-size:11px; padding:5px 10px;
    border-radius:6px; cursor:pointer; white-space:nowrap; font-family:inherit;
  }
  .btn-complete-project:hover{background:var(--done-dim);}
  .btn-delete-project{
    background:none; border:1px solid var(--ink-650);
    color:var(--text-faint); font-size:11px; padding:5px 10px;
    border-radius:6px; cursor:pointer; white-space:nowrap; font-family:inherit;
  }
  .btn-delete-project:hover{border-color:var(--missed); color:var(--missed);}
  .section-divider{
    margin:20px 0 16px;
    padding-top:16px;
    border-top:1px solid var(--ink-700);
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.1em;
    color:var(--text-faint);
    font-weight:600;
  }

  /* ---------- Stats ---------- */
  .stat-grid{display:grid; grid-template-columns:repeat(auto-fit, minmax(125px,1fr)); gap:10px;}
  .stat-card{
    background:var(--ink-800-solid);
    border:1px solid var(--ink-700);
    border-radius:var(--radius-md);
    padding:14px;
    text-align:center;
  }
  .stat-card .sc-value{font-family:var(--font-mono); font-size:23px; color:var(--brass-300); font-weight:600;}
  .stat-card .sc-label{font-size:10.5px; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-muted); margin-top:5px;}

  .bar-chart{display:flex; align-items:flex-end; gap:8px; height:110px; padding-top:10px;}
  .bar-col{flex:1; display:flex; flex-direction:column; align-items:center; height:100%; justify-content:flex-end; gap:6px;}
  .bar-fill-wrap{flex:1; display:flex; align-items:flex-end; width:100%; justify-content:center;}
  .bar-fill{
    width:55%;
    min-height:3px;
    background:linear-gradient(180deg, var(--brass-300), var(--brass-600));
    border-radius:4px 4px 0 0;
    transition:height .4s ease;
  }
  .bar-col .bar-label{font-family:var(--font-mono); font-size:9.5px; color:var(--text-faint); text-transform:uppercase;}

  .heatmap-scroll{overflow-x:auto; padding-bottom:6px;}
  .heatmap{display:grid; grid-auto-flow:column; grid-template-rows:repeat(7,11px); gap:3px;}
  .heat-cell{width:11px; height:11px; border-radius:2px; background:var(--ink-700);}
  .heat-cell.level-1{background:var(--missed-dim);}
  .heat-cell.level-2{background:#3a2f17;}
  .heat-cell.level-3{background:#5a4520;}
  .heat-cell.level-4{background:var(--brass-500);}
  .heat-legend{display:flex; align-items:center; gap:6px; margin-top:10px; font-size:10.5px; color:var(--text-faint);}
  .heat-legend .heat-cell{cursor:default;}

  .reset-row{margin-top:30px; text-align:center;}
  .reset-link{
    background:none; border:none;
    color:var(--text-faint);
    font-size:11.5px;
    text-decoration:underline;
    cursor:pointer;
  }
  .reset-link:hover{color:var(--missed);}

  /* ---------- Bottom nav ---------- */
  .bottom-nav{
    position:fixed; bottom:0; left:0; right:0;
    background:var(--ink-850);
    border-top:1px solid var(--ink-700);
    display:flex; justify-content:center;
    z-index:50;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .bottom-nav-inner{display:flex; justify-content:space-around; width:100%; max-width:680px; padding:6px 6px;}
  .nav-btn{
    flex:1;
    display:flex; flex-direction:column; align-items:center; gap:3px;
    background:none; border:none;
    color:var(--text-faint);
    font-size:9.5px;
    cursor:pointer;
    padding:7px 2px;
    border-radius:8px;
  }
  .nav-btn svg{width:20px; height:20px;}
  .nav-btn.active{color:var(--brass-300);}

  /* ---------- Toast ---------- */
  .toast{
    position:fixed;
    bottom:78px; left:50%;
    transform:translateX(-50%) translateY(10px);
    background:var(--ink-700);
    border:1px solid var(--brass-600);
    color:var(--parchment);
    padding:9px 16px;
    border-radius:20px;
    font-size:12.5px;
    opacity:0;
    pointer-events:none;
    transition:opacity .25s ease, transform .25s ease;
    z-index:80;
    white-space:nowrap;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  @media (min-width:560px){
    .masthead h1{font-size:34px;}
  }

  /* ---------- Recordatorio por tarea ---------- */
  .task-reminder-row{
    width:100%;
    display:flex;
    align-items:center;
    gap:8px;
    margin-top:8px;
    padding-top:8px;
    border-top:1px solid var(--ink-700);
    flex-wrap:wrap;
  }
  .reminder-time-badge{
    display:inline-flex;
    align-items:center;
    gap:4px;
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--brass-300);
    background:rgba(168,123,60,0.12);
    border:1px solid rgba(168,123,60,0.25);
    border-radius:20px;
    padding:3px 9px;
  }
  .reminder-time-badge svg{width:11px;height:11px;}
  .task-item.has-reminder{
    flex-wrap:wrap;
  }
  .task-main-row{
    display:flex;
    align-items:center;
    gap:12px;
    width:100%;
  }
  .reminder-inline-form{
    display:flex;
    align-items:center;
    gap:6px;
    flex-wrap:wrap;

    margin-top:8px;
    padding-top:8px;

  .reminder-inline-form label{
    font-size:11.5px;
    color:var(--text-muted);

  .reminder-inline-form input[type="time"]{

  .btn-remind-save{

  .btn-remind-save:hover{background:var(--brass-300);}
  .btn-remind-clear{
    background:none;border:1px solid var(--ink-650);color:var(--text-faint);

    font-family:inherit;

  .btn-remind-clear:hover{color:var(--missed);border-color:var(--missed);}
  .btn-remind-export{
    background:none;border:1px solid var(--ink-650);color:var(--text-muted);
    font-size:11px;padding:5px 9px;border-radius:var(--radius-sm);cursor:pointer;
    font-family:inherit;display:inline-flex;align-items:center;gap:4px;

  .btn-remind-export:hover{color:var(--brass-300);border-color:var(--brass-500);}
  .btn-remind-export svg{width:12px;height:12px;}
  .notif-denied-msg{
    font-size:11px;color:var(--missed);width:100%;margin-top:4px;
  }
  .task-bell-btn{
    flex:0 0 auto;background:none;border:none;
    color:var(--text-faint);cursor:pointer;padding:0 2px;
    display:flex;align-items:center;transition:color .15s;
  }
  .task-bell-btn:hover{color:var(--brass-300);}
  .task-bell-btn.has-reminder{color:var(--brass-400,#c9974a);}
  .task-bell-btn svg{width:15px;height:15px;}
  .form-reminder-row{
    width:100%;display:flex;align-items:center;gap:8px;flex-wrap:wrap;
    margin-top:4px;
  }
  .form-reminder-row label{font-size:12px;color:var(--text-muted);white-space:nowrap;}
  .form-reminder-row input[type="time"]{
    background:var(--ink-800-solid);border:1px solid var(--ink-700);
    color:var(--text-light);font-family:var(--font-mono);font-size:12px;
    padding:8px 10px;border-radius:var(--radius-sm);color-scheme:dark;
  }

  /* ---------- Evidence Modal ---------- */
  .modal-overlay{
    position:fixed; inset:0;
    background:rgba(10,27,39,0.85);
    display:none;
    align-items:center; justify-content:center;
    z-index:200;
    padding:16px;
    backdrop-filter:blur(4px);
  }
  .modal-overlay.open{display:flex; animation:fadeIn .2s ease;}
  .modal-box{
    background:var(--ink-850);
    border:1px solid var(--ink-700);
    border-radius:var(--radius-lg);
    padding:24px 22px;
    width:100%; max-width:440px;
    max-height:90vh; overflow-y:auto;
  }
  .modal-box h3{
    font-size:17px; color:var(--brass-300);
    margin-bottom:6px;
  }
  .modal-hint{font-size:12.5px; color:var(--text-muted); margin:0 0 14px;}
  .modal-textarea{
    width:100%; min-height:90px;
    background:var(--ink-800-solid);
    border:1px solid var(--ink-700);
    border-radius:var(--radius-sm);
    color:var(--text-light);
    font-family:var(--font-body);
    font-size:14px;
    padding:11px 13px;
    resize:vertical;
    margin-bottom:12px;
  }
  .modal-textarea::placeholder{color:var(--text-faint);}
  .modal-or{
    text-align:center; font-size:11px; color:var(--text-faint);
    letter-spacing:0.08em; margin:4px 0 12px;
  }
  .modal-file-label{
    display:block;
    border:1px dashed var(--ink-650);
    border-radius:var(--radius-md);
    padding:14px;
    text-align:center;
    color:var(--text-muted);
    font-size:13px;
    cursor:pointer;
    transition:border-color .15s, color .15s;
    margin-bottom:12px;
  }
  .modal-file-label:hover{border-color:var(--brass-500); color:var(--text-light);}
  .modal-file-label input[type="file"]{display:none;}
  #evidencePreview{
    margin-bottom:12px; text-align:center;
  }
  #evidencePreview img{
    max-width:100%; max-height:200px;
    border-radius:var(--radius-md);
    border:1px solid var(--ink-700);
  }
  #evidencePreview .preview-note{
    font-size:11px; color:var(--done); margin-top:5px;
  }
  .modal-actions{
    display:flex; gap:8px; flex-wrap:wrap; margin-top:4px;
  }
  .modal-actions button{flex:1;}

  /* View evidence modal content */
  #viewEvidenceContent{
    margin-bottom:16px;
  }
  #viewEvidenceContent img{
    max-width:100%; border-radius:var(--radius-md);
    border:1px solid var(--ink-700); margin-bottom:10px;
    display:block;
  }
  #viewEvidenceContent .ev-note{
    font-size:14px; color:var(--text-light);
    background:var(--ink-800-solid);
    border:1px solid var(--ink-700);
    border-radius:var(--radius-sm);
    padding:11px 13px;
    white-space:pre-wrap;
    line-height:1.55;
  }
  #viewEvidenceContent .ev-meta{
    font-family:var(--font-mono); font-size:11px; color:var(--text-faint);
    margin-top:10px;
  }
  #viewEvidenceContent .ev-empty{
    text-align:center; padding:24px; color:var(--text-muted); font-size:13px;
    border:1px dashed var(--ink-700); border-radius:var(--radius-md);
  }
</style>
</head>
<body>

<header class="masthead">
  <h1>Bitácora</h1>
  <div class="subtitle">Diario de hábitos y tareas</div>
  <div class="voyage-line" id="voyageLine"></div>
</header>

<main id="app"></main>

<div class="toast" id="toast"></div>

<!-- ===== Modal: Captura de evidencia ===== -->
<div id="evidenceModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="evidModalTitle">
  <div class="modal-box">
    <h3 id="evidModalTitle">📋 Evidencia de cumplimiento</h3>
    <p class="modal-hint">Agrega una nota <strong>o</strong> una foto como evidencia (al menos uno es requerido).</p>

      <span>Estadísticas</span>

<script>
(function(){
  "use strict";

  /* ===================== Constantes ===================== */
  var STORAGE_KEY = "bitacora-app-data";
  var WD_SHORT = ["dom","lun","mar","mié","jue","vie","sáb"];
  var WD_MON_FIRST = ["lun","mar","mié","jue","vie","sáb","dom"];
  var MONTHS = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
  /* Días de la semana en UI (orden lunes-primero) label => JS day index */
  var DAY_UI = [
    { label:"L", day:1 },
    { label:"M", day:2 },
    { label:"X", day:3 },
    { label:"J", day:4 },
    { label:"V", day:5 },
    { label:"S", day:6 },
    { label:"D", day:0 }
  ];

  var ICON_CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 13 10 18 19 7"/></svg>';
  var ICON_X     = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>';
  var ICON_EYE   = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
  var ICON_CALENDAR_SM = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>';
  var ICON_BELL  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>';

  /* ===================== Estado global ===================== */
  var state = null;
  var activeTab = "hoy";
  var selectedCalendarDate = null;
  var calendarViewDate = new Date();
  var openReminderPanel = null;
  /* Evidencia pendiente de guardar: { ds, id } */
  var pendingEvidence = null;

  /* ===================== IndexedDB ===================== */
  var db = null;

  function initDB(){
    return new Promise(function(resolve, reject){
      if (!window.indexedDB){ reject(new Error("No IndexedDB")); return; }
      var req = window.indexedDB.open("BitacoraDB", 1);
      req.onupgradeneeded = function(e){
        e.target.result.createObjectStore("evidence");
      };
      req.onsuccess = function(e){ db = e.target.result; resolve(db); };
      req.onerror   = function(){ reject(req.error); };
    });
  }

  function dbSet(key, value){
    return new Promise(function(resolve, reject){
      if (!db){ resolve(false); return; }
      try {
        var tx  = db.transaction("evidence", "readwrite");
        var store = tx.objectStore("evidence");
        store.put(value, key);
        tx.oncomplete = function(){ resolve(true); };
        tx.onerror    = function(){ reject(tx.error); };
      } catch(e){ reject(e); }
    });
  }

  function dbGet(key){
    return new Promise(function(resolve){
      if (!db){ resolve(null); return; }
      try {
        var tx  = db.transaction("evidence", "readonly");
        var req = tx.objectStore("evidence").get(key);
        req.onsuccess = function(){ resolve(req.result != null ? req.result : null); };
        req.onerror   = function(){ resolve(null); };
      } catch(e){ resolve(null); }
    });
  }

  /* ===================== Utilidades de fecha ===================== */
  function pad(n){ return n < 10 ? "0" + n : "" + n; }
  function dateToStr(d){ return d.getFullYear() + "-" + pad(d.getMonth()+1) + "-" + pad(d.getDate()); }
  function strToDate(s){
    var p = s.split("-");
    return new Date(parseInt(p[0],10), parseInt(p[1],10)-1, parseInt(p[2],10));
  }
  function todayStr(){ return dateToStr(new Date()); }
  function addDays(ds, n){ var d = strToDate(ds); d.setDate(d.getDate()+n); return dateToStr(d); }
  function formatDateLong(ds){
    var d = strToDate(ds);
    return ["domingo","lunes","martes","miércoles","jueves","viernes","sábado"][d.getDay()] +
           " " + d.getDate() + " de " + MONTHS[d.getMonth()] + " de " + d.getFullYear();
  }
  function formatDateShort(ds){
    var d = strToDate(ds);
    return d.getDate() + " " + MONTHS[d.getMonth()].slice(0,3);
  }
  function dateRangeArray(startStr, endStr){
    var arr = [], d = strToDate(startStr), end = strToDate(endStr), guard = 0;
    while (d <= end && guard < 5000){ arr.push(dateToStr(d)); d.setDate(d.getDate()+1); guard++; }
    return arr;
  }
  function daysUntil(ds){
    return Math.round((strToDate(ds) - strToDate(todayStr())) / 86400000);
  }

  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c];
    });
  }
  function capitalize(s){ return s.charAt(0).toUpperCase() + s.slice(1); }

  /* ===================== Almacenamiento ===================== */
  function hasCloudStorage(){
    return typeof window.storage === "object" && window.storage && typeof window.storage.get === "function";
  }
  function storageGet(key){
    return new Promise(function(resolve){
      if (hasCloudStorage()){
        window.storage.get(key, false).then(function(r){ resolve(r ? r.value : null); }).catch(function(){ resolve(null); });
      } else {
        try{ resolve(window.localStorage.getItem(key)); } catch(e){ resolve(null); }
      }
    });
  }
  function storageSet(key, value){
    return new Promise(function(resolve){
      if (hasCloudStorage()){
        window.storage.set(key, value, false).then(function(){ resolve(true); })
          .catch(function(){ showToast("No se pudo guardar la bitácora."); resolve(false); });
      } else {
        try{ window.localStorage.setItem(key, value); resolve(true); }
        catch(e){ showToast("No se pudo guardar la bitácora."); resolve(false); }
      }
    });
  }

  function defaultState(){
    return {
      firstUseDate: todayStr(),
      habits: [],
      oneoff: [],
      log: {},
      reminders: {},
      projects: [],
      routines: []
    };
  }

  function persist(){ return storageSet(STORAGE_KEY, JSON.stringify(state)); }

  function init(){
    var dbPromise = initDB().catch(function(){ db = null; return null; });
    var statePromise = storageGet(STORAGE_KEY);
    Promise.all([statePromise, dbPromise]).then(function(results){
      var raw = results[0];
      if (raw){
        try{ state = JSON.parse(raw); } catch(e){ state = defaultState(); }
      } else {
        state = defaultState();
      }
      /* Normalizar campos */
      state.habits       = state.habits       || [];
      state.oneoff       = state.oneoff       || [];
      state.log          = state.log          || {};
      state.firstUseDate = state.firstUseDate || todayStr();
      state.reminders    = state.reminders    || {};
      state.projects     = state.projects     || [];
      state.routines     = state.routines     || [];
      selectedCalendarDate = todayStr();
      persist();
      scheduleTodayReminders();
      render();
    });
  }

  /* ===================== Lógica de tareas ===================== */
  function getTasksForDate(ds){
    var tasks = [];
    /* Hábitos diarios */
    state.habits.forEach(function(h){
      if (h.archivedAt && ds > h.archivedAt) return;
      if (ds >= h.createdAt) tasks.push({ id:h.id, text:h.text, type:"habit" });
    });
    /* Tareas one-off */
    state.oneoff.forEach(function(o){
      if (o.date === ds) tasks.push({ id:o.id, text:o.text, type:"oneoff" });
    });
    /* Rutinas semanales: inyección por día */
    var dayOfWeek = strToDate(ds).getDay(); // 0=Dom ... 6=Sáb
    state.routines.forEach(function(r){
      if (r.days && r.days.indexOf(dayOfWeek) !== -1){
        tasks.push({ id:r.id, text:r.text, type:"routine", routineTime: r.time || null });
      }
    });
    return tasks;
  }

  function getStatus(ds, id){
    if (state.log[ds] && state.log[ds][id]) return "done";
    if (ds < todayStr()) return "missed";
    return "pending";
  }

  function dayStats(ds){
    var tasks = getTasksForDate(ds);
    var done = 0;
    tasks.forEach(function(t){ if (getStatus(ds, t.id) === "done") done++; });
    return { total: tasks.length, done: done };
  }

  /**
   * Marcar como hecha (sin modal de evidencia).
   * Llamado SOLO desde saveEvidence() después de guardar en IDB.
   */
  function markDone(ds, id){
    if (!state.log[ds]) state.log[ds] = {};
    state.log[ds][id] = true;
    persist();
    renderActiveTab();
  }

  /**
   * Desmarcar (toggle off). Directo, sin evidencia.
   */
  function unmarkDone(ds, id){
    if (state.log[ds]) delete state.log[ds][id];
    if (state.log[ds] && Object.keys(state.log[ds]).length === 0) delete state.log[ds];
    persist();
    renderActiveTab();
  }

  function addTask(text, date, repeat){
    text = (text || "").trim();
    if (!text) return;
    if (repeat){
      state.habits.push({ id:uid(), text:text, createdAt:date });
    } else {
      state.oneoff.push({ id:uid(), text:text, date:date });
    }
    persist();
    renderActiveTab();
    showToast(repeat ? "Hábito agregado." : "Tarea agregada.");
  }

  function deleteOneoff(id){
    state.oneoff = state.oneoff.filter(function(o){ return o.id !== id; });
    persist();
    renderActiveTab();
    showToast("Tarea eliminada.");
  }

  function archiveHabit(id){
    if (!window.confirm("¿Archivar este hábito? Dejará de aparecer desde hoy, pero conservarás su historial.")) return;
    var h = state.habits.find(function(x){ return x.id === id; });
    if (h) h.archivedAt = todayStr();
    persist();
    renderActiveTab();
    showToast("Hábito archivado.");
  }

  function resetAll(){
    if (!window.confirm("Esto borrará toda la bitácora: tareas, hábitos, proyectos, rutinas e historial. ¿Continuar?")) return;
    state = defaultState();
    selectedCalendarDate = todayStr();
    persist();
    renderActiveTab();
    showToast("Bitácora reiniciada.");
  }

  /* ===================== Proyectos ===================== */
  function addProject(text, deadline){
    text = (text || "").trim();
    if (!text || !deadline) return;
    state.projects.push({
      id: uid(),
      text: text,
      deadline: deadline,
      status: "active",
      createdAt: todayStr()
    });
    persist();
    renderActiveTab();
    showToast("Proyecto agregado.");
  }

  function completeProject(id){
    var p = state.projects.find(function(x){ return x.id === id; });
    if (p){ p.status = "completed"; p.completedAt = todayStr(); }
    persist();
    renderActiveTab();
    showToast("¡Proyecto completado!");
  }

  function deleteProject(id){
    if (!window.confirm("¿Eliminar este proyecto?")) return;
    state.projects = state.projects.filter(function(p){ return p.id !== id; });
    persist();
    renderActiveTab();
    showToast("Proyecto eliminado.");
  }

  /* ===================== Rutinas ===================== */
  function addRoutine(text, days, time){
    text = (text || "").trim();
    if (!text || !days || days.length === 0){
      showToast("Escribe un nombre y elige al menos un día.");
      return;
    }
    state.routines.push({ id: uid(), text: text, days: days, time: time || "" });
    persist();
    renderActiveTab();
    showToast("Rutina agregada.");
  }

  function deleteRoutine(id){
    state.routines = state.routines.filter(function(r){ return r.id !== id; });
    persist();
    renderActiveTab();
    showToast("Rutina eliminada.");
  }

  /* ===================== Estadísticas ===================== */
  function computeGlobalStats(){
    var total = 0, done = 0, missed = 0;
    dateRangeArray(state.firstUseDate, todayStr()).forEach(function(ds){
      getTasksForDate(ds).forEach(function(t){
        total++;
        var st = getStatus(ds, t.id);
        if (st === "done") done++;
        else if (st === "missed") missed++;
      });
    });
    var resolved = done + missed;
    var pct = resolved ? Math.round((done/resolved)*100) : 0;
    return { total: total, done: done, missed: missed, pct: pct };
  }
  function heatLevel(ds){
    var s = dayStats(ds);
    if (s.total === 0) return 0;
    var ratio = s.done / s.total;
    if (ratio >= 1) return 4;
    if (ratio >= 0.5) return 3;
    if (ratio > 0) return 2;
    return 1;
  }
  function computeCurrentStreak(){
    var today = todayStr();
    var ts = dayStats(today);
    var cursor = strToDate(today);
    if (!(ts.total > 0 && ts.done === ts.total)) cursor.setDate(cursor.getDate()-1);
    var streak = 0, guard = 0;
    while (guard < 5000){
      var ds = dateToStr(cursor);
      if (ds < state.firstUseDate) break;
      var s = dayStats(ds);
      if (s.total === 0){ cursor.setDate(cursor.getDate()-1); guard++; continue; }
      if (s.done === s.total){ streak++; cursor.setDate(cursor.getDate()-1); }
      else break;
      guard++;
    }
    return streak;
  }
  function computeBestStreak(){
    var best = 0, run = 0;
    var today = todayStr();
    dateRangeArray(state.firstUseDate, today).forEach(function(ds){
      if (ds === today) return;
      var s = dayStats(ds);
      if (s.total === 0) return;
      if (s.done === s.total){ run++; if (run > best) best = run; }
      else run = 0;
    });
    var ts = dayStats(today);
    if (ts.total > 0 && ts.done === ts.total){ run++; if (run > best) best = run; }
    return best;
  }
  function habitStreak(habit){
    var cursor = strToDate(todayStr());
    var streak = 0, guard = 0;
    var todayDs = todayStr();
    if (getStatus(todayDs, habit.id) !== "done") cursor.setDate(cursor.getDate()-1);
    while (guard < 5000){
      var ds = dateToStr(cursor);
      if (ds < habit.createdAt) break;
      if (getStatus(ds, habit.id) === "done"){ streak++; cursor.setDate(cursor.getDate()-1); }
      else break;
      guard++;
    }
    return streak;
  }
  function habitCompletionRate(habit){
    var today = todayStr();
    var endEx = addDays(today, -1);
    var dates = habit.createdAt <= endEx ? dateRangeArray(habit.createdAt, endEx) : [];
    if (getStatus(today, habit.id) === "done") dates.push(today);
    if (dates.length === 0) return null;
    var done = 0;
    dates.forEach(function(ds){ if (getStatus(ds, habit.id) === "done") done++; });
    return Math.round((done/dates.length)*100);
  }

  /* ===================== Recordatorios por tarea ===================== */
  var reminderTimers = {};

  function reminderKey(ds, taskId){ return ds + "|" + taskId; }
  function getReminder(ds, taskId){
    return (state.reminders && state.reminders[reminderKey(ds, taskId)]) || null;
  }
  function setReminder(ds, taskId, time){
    if (!state.reminders) state.reminders = {};
    if (time){ state.reminders[reminderKey(ds, taskId)] = time; }
    else { delete state.reminders[reminderKey(ds, taskId)]; }
    persist();
    scheduleTodayReminders();
  }
  function scheduleTodayReminders(){
    Object.keys(reminderTimers).forEach(function(k){ clearTimeout(reminderTimers[k]); });
    reminderTimers = {};
    if (!state.reminders || !("Notification" in window) || Notification.permission !== "granted") return;
    var today = todayStr(), now = new Date();
    Object.keys(state.reminders).forEach(function(key){
      var parts = key.split("|"), ds = parts[0], taskId = parts[1];
      if (ds !== today) return;
      var timeStr = state.reminders[key];
      if (!timeStr) return;
      var tp = timeStr.split(":");
      var target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), +tp[0], +tp[1], 0);
      var delay = target - now;
      if (delay < 0) return;
      reminderTimers[key] = setTimeout(function(){
        var tasks = getTasksForDate(today);
        var task = tasks.find(function(t){ return t.id === taskId; });
        if (!task || getStatus(today, taskId) === "done") return;
        try { new Notification("⏰ Bitácora — Recordatorio", { body: task.text, tag: "bitacora-" + key }); } catch(e){}
      }, delay);
    });
  }
  function requestNotifPermission(callback){
    if (!("Notification" in window)){ callback("unsupported"); return; }
    if (Notification.permission === "granted"){ callback("granted"); return; }
    if (Notification.permission === "denied"){ callback("denied"); return; }
    Notification.requestPermission().then(function(p){ callback(p); });
  }

  /* ===================== ICS / Google Calendar ===================== */
  function exportToIcs(taskText, ds, timeStr){
    var d = strToDate(ds);
    var y = d.getFullYear(), mo = pad(d.getMonth()+1), day = pad(d.getDate());
    var dates;
    var ctz = "America/La_Paz";
    if (timeStr){
      var tp = timeStr.split(":");
      var h = pad(+tp[0]), m = pad(+tp[1]);
      var dtStart = y + mo + day + "T" + h + m + "00";
      var totalMin = +tp[0]*60 + +tp[1] + 30;
      var endH = pad(Math.floor(totalMin/60)%24), endM = pad(totalMin%60);
      var endDay = day, endMo = mo, endY = y;
      if (totalMin >= 1440){
        var nextD = new Date(y, +mo-1, +day+1);
        endY = nextD.getFullYear(); endMo = pad(nextD.getMonth()+1); endDay = pad(nextD.getDate());
      }
      dates = dtStart + "/" + (endY + endMo + endDay + "T" + endH + endM + "00");
    } else {
      var dateStr = y + mo + day;
      dates = dateStr + "/" + dateStr;
    }
    var url = "https://calendar.google.com/calendar/render?action=TEMPLATE"
      + "&text=" + encodeURIComponent(taskText)
      + "&dates=" + encodeURIComponent(dates)
      + "&ctz="   + encodeURIComponent(ctz);
    window.open(url, "_blank");
    showToast("Abriendo Google Calendar…");
  }

  /* ===================== Evidencia (modal) ===================== */
  function compressImage(file, callback){
    var reader = new FileReader();
    reader.onload = function(e){
      var img = new Image();
      img.onload = function(){
        var maxSize = 800, w = img.width, h = img.height;
        if (w > maxSize || h > maxSize){
          if (w > h){ h = Math.round(h * maxSize / w); w = maxSize; }
          else { w = Math.round(w * maxSize / h); h = maxSize; }
        }
        var canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        callback(canvas.toDataURL("image/webp", 0.7));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function saveEvidence(){
    if (!pendingEvidence) return;
    var note       = document.getElementById("evidenceNote").value.trim();
    var compressed = document.getElementById("evidenceFile").getAttribute("data-compressed") || null;

    if (!note && !compressed){
      showToast("Escribe una nota o adjunta una foto.");
      return;
    }

    var key      = pendingEvidence.ds + "_" + pendingEvidence.id;
    var ds       = pendingEvidence.ds;
    var id       = pendingEvidence.id;
    var evidence = JSON.stringify({
      note:    note || null,
      image:   compressed || null,
      savedAt: new Date().toISOString()
    });

    dbSet(key, evidence).catch(function(){/* silently ignore IDB errors */}).then(function(){
      markDone(ds, id);
      closeEvidenceModal();
      showToast("¡Tarea cumplida y evidencia guardada!");

  function buildMonthGrid(viewDate){
    var year = viewDate.getFullYear(), month = viewDate.getMonth();

    var firstDow = new Date(year, month, 1).getDay();
    var offset = (firstDow + 6) % 7;
    var cells = [];
    for (var i=0;i<offset;i++) cells.push(null);
    for (var d=1; d<=daysInMonth; d++) cells.push(dateToStr(new Date(year, month, d)));
    return cells;
  }

      routineListHtml = state.routines.map(function(r){
        var dayChips = r.days.map(function(d){
          var lbl = DAY_UI.find(function(x){ return x.day === d; });
          return '<span class="routine-day-chip">' + (lbl ? lbl.label : d) + '</span>';
        }).join("");
        var timeChip = r.time ? '<span class="routine-time-chip">⏱ ' + escapeHtml(r.time) + '</span>' : "";
        return (
          '<div class="routine-item">' +
            '<div class="routine-item-body">' +
              '<div class="routine-item-text">' + escapeHtml(r.text) + '</div>' +
              '<div class="routine-item-meta">' + dayChips + timeChip + '</div>' +
            '</div>' +
            '<button class="routine-delete-btn" data-action="delete-routine" data-id="' + r.id + '" title="Eliminar rutina">&times;</button>' +
          '</div>'
        );
      }).join("");
    }

    return (
      '<section class="block">' +
        '<div class="block-title">Nuevo hábito</div>' +
        '<form class="add-form" data-action="add-habit">' +
          '<input type="text" name="text" placeholder="¿Qué hábito quieres formar?" maxlength="120" required />' +
          '<button type="submit" class="primary">Agregar</button>' +
        '</form>' +
      '</section>' +
      '<section class="block">' +
        '<div class="block-title">En seguimiento</div>' +
        listHtml +
      '</section>' +
      '<section class="block">' +
        '<div class="block-title">Rutinas semanales</div>' +
        routineFormHtml +
        routineListHtml +
      '</section>'
    );
  }

  /* ===================== Render: pestaña Proyectos ===================== */
  function renderProyectos(){
    var active    = state.projects.filter(function(p){ return p.status === "active"; });
    var completed = state.projects.filter(function(p){ return p.status === "completed"; });

    /* Ordenar activos por fecha límite */
    active.sort(function(a,b){ return a.deadline < b.deadline ? -1 : a.deadline > b.deadline ? 1 : 0; });

    function projectCard(p){
      var isCompleted = p.status === "completed";
      var deadlineBadge = "";
      if (!isCompleted){
        var diff = daysUntil(p.deadline);
        var cls  = diff < 0 ? "urgent" : diff <= 7 ? "soon" : "ok";
        var txt  = diff < 0 ? "Venció hace " + Math.abs(diff) + "d"
                 : diff === 0 ? "¡Vence hoy!"
                 : "Vence en " + diff + " día" + (diff===1?"":"s");
        deadlineBadge = '<span class="project-deadline-badge ' + cls + '">📅 ' + txt + ' · ' + formatDateShort(p.deadline) + '</span>';
      } else {
        deadlineBadge = '<span class="project-deadline-badge done-badge">✔ Completado el ' + (p.completedAt ? formatDateShort(p.completedAt) : "—") + '</span>';
      }
      var actions = isCompleted
        ? '<button class="btn-delete-project" data-action="delete-project" data-id="' + p.id + '">Eliminar</button>'
        : (
            '<button class="btn-complete-project" data-action="complete-project" data-id="' + p.id + '">✔ Completar</button>' +
            '<button class="btn-delete-project" data-action="delete-project" data-id="' + p.id + '">Eliminar</button>'
          );
      return (
        '<div class="project-item' + (isCompleted ? " is-completed" : "") + '">' +
          '<div class="project-header">' +
            '<div class="project-name">' + escapeHtml(p.text) + '</div>' +
            '<div class="project-actions">' + actions + '</div>' +
          '</div>' +
          '<div class="project-meta">' +
            deadlineBadge +
            '<span style="font-size:11px;color:var(--text-faint);">Creado: ' + formatDateShort(p.createdAt) + '</span>' +
          '</div>' +
        '</div>'
      );
    }

    var activeHtml = active.length
      ? active.map(projectCard).join("")
      : '<div class="empty-state"><strong>No hay proyectos activos.</strong>Crea uno para empezar a seguirlo.</div>';

    var completedHtml = completed.length
      ? '<div class="section-divider">Proyectos completados (' + completed.length + ')</div>' + completed.map(projectCard).join("")
      : "";

    return (
      '<section class="block">' +
        '<div class="block-title">Nuevo proyecto</div>' +
        '<form class="add-form" style="flex-direction:column;align-items:flex-start;gap:8px;" data-action="add-project">' +
          '<div style="display:flex;gap:8px;flex-wrap:wrap;width:100%;">' +
            '<input type="text" name="projectText" placeholder="Nombre del proyecto u objetivo" maxlength="150" required style="flex:1;min-width:180px;" />' +
            '<input type="date" name="projectDeadline" title="Fecha límite" required style="width:150px;" />' +
          '</div>' +
          '<button type="submit" class="primary" style="align-self:flex-start;">Agregar proyecto</button>' +
        '</form>' +
      '</section>' +
      '<section class="block">' +
        '<div class="block-title">Proyectos activos (' + active.length + ')</div>' +
        activeHtml +
        completedHtml +
      '</section>'
    );
  }

  /* ===================== Render: pestaña Estadísticas ===================== */
  function renderEstadisticas(){
    var g          = computeGlobalStats();
    var curStreak  = computeCurrentStreak();
    var bestStreak = computeBestStreak();

    /* Proyectos */
    var activeProjects    = state.projects.filter(function(p){ return p.status === "active"; }).length;
    var completedProjects = state.projects.filter(function(p){ return p.status === "completed"; }).length;

    var statCards =
      '<div class="stat-grid">' +
        '<div class="stat-card"><div class="sc-value">' + g.total    + '</div><div class="sc-label">Propuestas</div></div>' +
        '<div class="stat-card"><div class="sc-value">' + g.done     + '</div><div class="sc-label">Cumplidas</div></div>' +
        '<div class="stat-card"><div class="sc-value">' + g.missed   + '</div><div class="sc-label">No cumplidas</div></div>' +
        '<div class="stat-card"><div class="sc-value">' + g.pct + '%</div><div class="sc-label">Cumplimiento</div></div>' +
      '</div>';

    var streakCards =
      '<div class="stat-grid">' +
        '<div class="stat-card"><div class="sc-value">' + curStreak  + '</div><div class="sc-label">Racha actual</div></div>' +
        '<div class="stat-card"><div class="sc-value">' + bestStreak + '</div><div class="sc-label">Mejor racha</div></div>' +
      '</div>';

    var projectCards =
      '<div class="stat-grid">' +
        '<div class="stat-card"><div class="sc-value" style="color:var(--brass-300)">' + activeProjects    + '</div><div class="sc-label">Proyectos activos</div></div>' +
        '<div class="stat-card"><div class="sc-value" style="color:var(--done)">'      + completedProjects + '</div><div class="sc-label">Proyectos completados</div></div>' +
        '<div class="stat-card"><div class="sc-value">' + state.routines.length        + '</div><div class="sc-label">Rutinas configuradas</div></div>' +
      '</div>';

    var today  = todayStr();
    var last7  = [];
    for (var i=6;i>=0;i--) last7.push(addDays(today,-i));
    var barHtml = '<div class="bar-chart">' + last7.map(function(ds){
      var s   = dayStats(ds);
      var pct = s.total ? Math.round((s.done/s.total)*100) : 0;
      var d   = strToDate(ds);
      return (
        '<div class="bar-col" title="' + formatDateShort(ds) + ": " + s.done + "/" + s.total + '">' +
          '<div class="bar-fill-wrap"><div class="bar-fill" style="height:' + (s.total? Math.max(pct,4):0) + '%"></div></div>' +
          '<div class="bar-label">' + WD_SHORT[d.getDay()] + '</div>' +
        '</div>'
      );
    }).join("") + '</div>';

    var heatDays  = dateRangeArray(addDays(today,-83), today);
    var heatCells = heatDays.map(function(ds){
      var s   = dayStats(ds);
      var lvl = heatLevel(ds);
      return '<div class="heat-cell level-' + lvl + '" title="' + formatDateShort(ds) + ": " + s.done + "/" + s.total + '"></div>';
    }).join("");

    return (
      '<section class="block">' +
        '<div class="block-title">Resumen general</div>' + statCards +
      '</section>' +
      '<section class="block">' +
        '<div class="block-title">Constancia</div>' + streakCards +
      '</section>' +
      '<section class="block">' +
        '<div class="block-title">Proyectos &amp; rutinas</div>' + projectCards +
      '</section>' +
      '<section class="block">' +
        '<div class="block-title">Últimos 7 días</div>' + barHtml +
      '</section>' +
      '<section class="block">' +
        '<div class="block-title">Bitácora de los últimos 12 semanas</div>' +
        '<div class="heatmap-scroll"><div class="heatmap">' + heatCells + '</div></div>' +
        '<div class="heat-legend">Menos' +
          '<div class="heat-cell level-1"></div><div class="heat-cell level-2"></div><div class="heat-cell level-3"></div><div class="heat-cell level-4"></div>' +
        'Más</div>' +
      '</section>' +
      '<div class="reset-row"><button class="reset-link" data-action="reset-all">Restablecer toda la bitácora</button></div>'
    );
  }

  /* ===================== Render principal ===================== */
  function render(){
    renderVoyageLine();
    document.querySelectorAll(".nav-btn").forEach(function(btn){
      btn.classList.toggle("active", btn.getAttribute("data-tab") === activeTab);
    });
    renderActiveTab();
  }

  function renderActiveTab(){
    var app  = document.getElementById("app");
    var html = "";
    if      (activeTab === "hoy")          html = renderHoy();
    else if (activeTab === "calendario")   html = renderCalendario();
    else if (activeTab === "habitos")      html = renderHabitos();
    else if (activeTab === "proyectos")    html = renderProyectos();
    else if (activeTab === "estadisticas") html = renderEstadisticas();
    app.innerHTML = html;
  }

  /* ===================== Eventos: clicks ===================== */
  document.addEventListener("click", function(e){
    /* Nav tabs */
    var navBtn = e.target.closest(".nav-btn");
    if (navBtn && navBtn.hasAttribute("data-tab")){
      activeTab = navBtn.getAttribute("data-tab");
      openReminderPanel = null;
      document.querySelectorAll(".nav-btn").forEach(function(b){ b.classList.toggle("active", b === navBtn); });
      renderActiveTab();
      return;
    }

    var el = e.target.closest("[data-action]");
    if (!el) return;
    var action = el.getAttribute("data-action");

    if (action === "toggle-task"){
      if (el.disabled) return;
      var ds = el.getAttribute("data-date");
      var id = el.getAttribute("data-id");
      var status = getStatus(ds, id);
      if (status === "done"){
        /* Desmarcar directo */
        unmarkDone(ds, id);
      } else {
        /* Pedir evidencia antes de marcar */
        openEvidenceModal(ds, id);
      }

    } else if (action === "view-evidence"){
      openViewEvidenceModal(el.getAttribute("data-date"), el.getAttribute("data-id"));

    } else if (action === "delete-task"){
      deleteOneoff(el.getAttribute("data-id"));

    } else if (action === "archive-habit"){
      archiveHabit(el.getAttribute("data-id"));

    } else if (action === "delete-routine"){
      deleteRoutine(el.getAttribute("data-id"));

    } else if (action === "complete-project"){
      completeProject(el.getAttribute("data-id"));

    } else if (action === "delete-project"){
      deleteProject(el.getAttribute("data-id"));

    } else if (action === "reset-all"){
      resetAll();

    } else if (action === "toggle-reminder-panel"){
      var rk = el.getAttribute("data-rkey");
      openReminderPanel = (openReminderPanel === rk) ? null : rk;
      renderActiveTab();

    } else if (action === "save-reminder"){
      var saveDs  = el.getAttribute("data-date");
      var saveId  = el.getAttribute("data-id");
      var inputId = "rtime-" + reminderKey(saveDs, saveId).replace(/[|]/g,"_");
      var inp     = document.getElementById(inputId);
      var timeVal = inp ? inp.value : "";
      if (!timeVal){ showToast("Elegí una hora."); return; }
      requestNotifPermission(function(perm){
        setReminder(saveDs, saveId, timeVal);
        openReminderPanel = null;
        renderActiveTab();
        if (perm === "granted") showToast("Recordatorio guardado para las " + timeVal + ".");
        else if (perm === "denied") showToast("Guardado. Activá notificaciones en el navegador para recibirlo.");
        else showToast("Guardado. Exportá el .ics para agregarlo a tu calendario.");
      });

    } else if (action === "clear-reminder"){
      setReminder(el.getAttribute("data-date"), el.getAttribute("data-id"), null);
      openReminderPanel = null;
      renderActiveTab();
      showToast("Recordatorio eliminado.");

    } else if (action === "export-ics"){
      var icsDs   = el.getAttribute("data-date");
      var icsId   = el.getAttribute("data-id");
      var icsTasks = getTasksForDate(icsDs);
      var icsTask  = icsTasks.find(function(t){ return t.id === icsId; });
      if (icsTask) exportToIcs(icsTask.text, icsDs, getReminder(icsDs, icsId));

    } else if (action === "cal-select"){
      selectedCalendarDate = el.getAttribute("data-date");
      openReminderPanel = null;
      renderActiveTab();

    } else if (action === "cal-prev"){
      calendarViewDate.setMonth(calendarViewDate.getMonth()-1);
      renderActiveTab();

    } else if (action === "cal-next"){
      calendarViewDate.setMonth(calendarViewDate.getMonth()+1);
      renderActiveTab();
    }
  });

  /* ===================== Eventos: submits ===================== */
  document.addEventListener("submit", function(e){
    /* Tarea / hábito */
    var taskForm = e.target.closest('[data-action="add-task"]');
    if (taskForm){
      e.preventDefault();
      var text      = taskForm.elements["text"].value;
      var repeatEl  = taskForm.elements["repeat"];
      var repeat    = repeatEl ? repeatEl.checked : false;
      var date      = taskForm.getAttribute("data-date");
      addTask(text, date, repeat);
      taskForm.reset();
      return;
    }
    /* Hábito desde pestaña hábitos */
    var habitForm = e.target.closest('[data-action="add-habit"]');
    if (habitForm){
      e.preventDefault();
      var htext = habitForm.elements["text"].value;
      addTask(htext, todayStr(), true);
      habitForm.reset();
      return;
    }
    /* Rutina */
    var routineForm = e.target.closest('[data-action="add-routine"]');
    if (routineForm){
      e.preventDefault();
      var rtext = routineForm.elements["routineText"].value;
      var rtime = routineForm.elements["routineTime"].value;
      var checkboxes = routineForm.querySelectorAll('input[name="days"]:checked');
      var rdays = [];
      for (var i = 0; i < checkboxes.length; i++){ rdays.push(parseInt(checkboxes[i].value, 10)); }
      addRoutine(rtext, rdays, rtime);
      routineForm.reset();
      return;
    }
    /* Proyecto */
    var projectForm = e.target.closest('[data-action="add-project"]');
    if (projectForm){
      e.preventDefault();
      var ptext     = projectForm.elements["projectText"].value;
      var pdeadline = projectForm.elements["projectDeadline"].value;
      addProject(ptext, pdeadline);
      projectForm.reset();
      return;
    }
  });

  /* ===================== Arranque ===================== */
  init();
})();
</script>
</body>
</html>
